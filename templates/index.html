<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta charset="UTF-8"/>
<meta name="theme-color" content="#000"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BLANK_</title>
<style>
/*
  ═══════════════════════════════════════════════════════════
  LAYOUT STRATEGY — read before touching anything
  ═══════════════════════════════════════════════════════════

  PROBLEM: On Android WebView, when the soft keyboard opens:
    1. The layout viewport shrinks to exclude keyboard height.
    2. position:fixed elements re-anchor to the NEW (smaller) layout
       viewport top — so they appear to "jump up".
    3. Elements sized with height:100% or flex:1 also shrink.
    4. Result: everything shifts up, content hidden, can't scroll.

  SOLUTION — Three-layer approach:
  ─────────────────────────────────
  Layer 1 — SHELL (#app):
    • position:absolute on #app, locked to body (which is height:100%
      from the INITIAL paint and never changes because body has
      overflow:hidden and no dynamic resizing).
    • This gives us a stable coordinate space that the keyboard cannot
      shrink.

  Layer 2 — CHAT (#chat):
    • position:absolute, fills #main completely (top:0 bottom:0).
    • padding-bottom is set large enough to always clear the bar.
    • overflow-y:auto — always independently scrollable.
    • NEVER resized by JS. Its scroll is not affected by keyboard.

  Layer 3 — INPUT BAR (#bar):
    • position:fixed, anchored to bottom of VISUAL viewport.
    • The visualViewport API tells us the exact y offset and height of
      the visible area even when the keyboard is open.
    • We use JS to set #bar's `bottom` to always be at the top of the
      keyboard — so it stays glued to the keyboard, not jumping around.
    • This is the ONLY correct cross-browser/WebView solution.

  SCROLL FIX:
    • #chat is position:absolute with a fixed height (fills #main).
    • Its scrollHeight is always the full content height.
    • The keyboard does not affect it — it scrolls freely at all times.
    • We add enough padding-bottom so the last message is never hidden
      behind the bar even when keyboard is open.
  ═══════════════════════════════════════════════════════════
*/

:root {
  --sw:    280px;
  --stw:   56px;
  --bg:    #000;
  --bord:  rgba(255,255,255,0.07);
  --font:  -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --ez:    cubic-bezier(0.25,0.46,0.45,0.94);
  --ezs:   cubic-bezier(0.34,1.56,0.64,1);
  --bar-h: 68px;  /* approximate bar height — used for padding-bottom of chat */
}

*,*::before,*::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

html {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
}

html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}



body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg); color: #fff; font-family: var(--font);
  /* NO position:fixed — breaks Android WebView black screen */
  /* height:100% locks to initial paint height, never resizes */
}

/* ── APP: locked absolute shell ── */
#app {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  overflow: hidden;
  background: var(--bg);
}

/* ── OVERLAY ── */
#overlay {
  position: absolute; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.6);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s var(--ez);
}
#overlay.on { opacity: 1; pointer-events: all; }

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
#sb {
  position: relative; z-index: 1000;
  display: flex; flex-direction: column; flex-shrink: 0;
  width: var(--sw); height: 100%;
  background: rgba(10,10,10,0.96);
  border-right: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
  transition: width 0.32s var(--ez);
}
#sb.col { width: var(--stw); }
#sb.col .sbf { display: none; }
#sb.col .sbs { display: flex; }

.sbf { display: flex; flex-direction: column; height: 100%; min-height: 0; }

.sbh {
  flex-shrink: 0;
  padding: 20px 14px 14px;
  padding-top: max(20px, calc(14px + env(safe-area-inset-top, 0px)));
  border-bottom: 1px solid var(--bord);
  display: flex; flex-direction: column; gap: 10px;
}

.sbbrand {
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: 0.28em; text-transform: uppercase;
  background: linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 8s linear infinite;
}

.ncbtn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 13px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
  color: #bbb; font-family: var(--font);
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; flex-shrink: 0; min-height: 48px;
  transition: background 0.2s var(--ez), color 0.2s var(--ez);
  -webkit-appearance: none; appearance: none; outline: none;
}
.ncbtn svg { fill: currentColor; width: 15px; height: 15px; flex-shrink: 0; }
.ncbtn:hover  { background: rgba(255,255,255,0.12); color: #fff; }
.ncbtn:active { background: rgba(255,255,255,0.18); }

.sbl {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 6px 8px;
  display: flex; flex-direction: column; gap: 2px;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
}
.sbl::-webkit-scrollbar { width: 3px; }
.sbl::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
.sbl-empty { color: #555; font-size: 0.7rem; padding: 14px 8px; letter-spacing: 0.08em; }

.si {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 10px; border-radius: 8px;
  cursor: pointer; min-height: 48px;
  transition: background 0.16s var(--ez);
  -webkit-user-select: none; user-select: none;
}
.si:hover  { background: rgba(255,255,255,0.05); }
.si.act    { background: rgba(255,255,255,0.10); }
.si:active { background: rgba(255,255,255,0.14); }
.si-t {
  flex: 1; font-size: 0.8rem; color: #777;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: color 0.16s var(--ez);
}
.si.act .si-t { color: #fff; }
.si-d {
  flex-shrink: 0; background: transparent; border: none;
  color: #444; padding: 7px; cursor: pointer; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.18s var(--ez);
  min-width: 36px; min-height: 36px;
}
.si-d svg { fill: currentColor; width: 16px; height: 16px; display: block; }
.si-d:hover  { color: #ff4444; }
.si-d:active { opacity: 0.7; }

.sbfoot {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  padding-bottom: max(12px, calc(12px + env(safe-area-inset-bottom, 0px)));
  border-top: 1px solid var(--bord);
}
.sbuser {
  font-size: 0.7rem; color: #555;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0; margin-right: 8px;
}
.logout {
  flex-shrink: 0; display: inline-flex; align-items: center;
  padding: 6px 10px; background: transparent;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  color: #555; font-family: var(--font);
  font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s, border-color 0.2s;
}
.logout:hover { color: #bbb; border-color: rgba(255,255,255,0.2); }

/* strip */
.sbs {
  display: none; flex-direction: column; align-items: center;
  padding: 14px 0; gap: 14px; height: 100%;
}
.sbs-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  color: #666; cursor: pointer; flex-shrink: 0;
  transition: background 0.2s, color 0.2s;
}
.sbs-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.sbs-btn svg { fill: currentColor; width: 16px; height: 16px; }
.sbs-brand {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 0.52rem; font-weight: 800;
  letter-spacing: 0.25em; text-transform: uppercase;
  background: linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 8s linear infinite; flex: 1;
}

/* ══════════════════════════════
   MAIN PANEL
══════════════════════════════ */
#main {
  flex: 1; min-width: 0; height: 100%;
  position: relative; overflow: hidden; z-index: 1;
}

/* ── header ── */
#hdr {
  position: absolute; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  padding-top: max(14px, calc(14px + env(safe-area-inset-top, 0px)));
  background: rgba(0,0,0,0.72);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

#menubtn {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  min-width: 44px; min-height: 44px;
  background: transparent; border: none; color: #555;
  cursor: pointer; border-radius: 10px;
  transition: color 0.2s var(--ez);
}
#menubtn:hover  { color: #fff; }
#menubtn:active { opacity: 0.7; }
#menubtn svg { fill: currentColor; width: 22px; height: 22px; display: block; }

.hc { flex: 1; display: flex; flex-direction: column; align-items: center; }
.htitle {
  font-size: 1.35rem; font-weight: 800;
  letter-spacing: 0.3em; text-transform: uppercase;
  background: linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 8s linear infinite;
}
.hsub { font-size: 0.5rem; letter-spacing: 0.22em; color: #444; text-transform: uppercase; margin-top: 1px; }

.mpill { position: relative; margin-top: 6px; }
.mtrig {
  display: flex; align-items: center; gap: 4px; padding: 5px 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
  color: #666; font-family: var(--font);
  font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
  -webkit-user-select: none; user-select: none;
  transition: color 0.2s, border-color 0.2s;
}
.mtrig:hover { color: #bbb; border-color: rgba(255,255,255,0.2); }
.mtrig svg { fill: currentColor; width: 10px; height: 10px; transition: transform 0.22s var(--ez); }
.mtrig.open svg { transform: rotate(180deg); }

.mdrop {
  position: fixed; z-index: 9999;
  display: flex; flex-direction: column; gap: 2px; padding: 6px; min-width: 170px;
  background: #141414; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.22s var(--ez), transform 0.22s var(--ez);
}
.mdrop.open { opacity: 1; pointer-events: all; transform: translateY(0); }
.mopt {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: 9px;
  font-family: var(--font); font-size: 0.72rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #666; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.mopt:hover { background: rgba(255,255,255,0.07); color: #fff; }
.mopt.sel   { color: #fff; }
.mdot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #00ff87; box-shadow: 0 0 8px rgba(0,255,135,0.8);
  opacity: 0; flex-shrink: 0; transition: opacity 0.18s;
}
.mopt.sel .mdot { opacity: 1; }
.hr { flex-shrink: 0; min-width: 44px; }

/* ══════════════════════════════
   WELCOME ("Ready.")
   Absolutely positioned in #main — never in the chat flow.
   Shown/hidden by opacity so it never causes layout shifts.
══════════════════════════════ */
#wlc {
  position: absolute;
  top: 42%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; pointer-events: none;
  -webkit-user-select: none; user-select: none;
  z-index: 10; width: 100%;
  opacity: 1;
  transition: opacity 0.3s var(--ez);
}
#wlc.hide { opacity: 0; }
#wlc span {
  font-size: 2rem; font-weight: 600; color: #fff; letter-spacing: -0.01em;
  animation: textGlow 3s ease-in-out infinite;
}

/* ══════════════════════════════
   CHAT SCROLL AREA
   ─────────────────────────────
   KEY DECISIONS:
   • position:absolute fills #main completely, top:0 to bottom:0.
     Its height is ALWAYS the full #main height regardless of keyboard.
   • overflow-y:auto — always independently scrollable.
   • padding-bottom is extra large (200px) so the last message is
     never hidden behind the input bar even with keyboard open.
   • We NEVER change its height or position via JS.
   • -webkit-overflow-scrolling:touch gives momentum scrolling and
     allows scroll to the very top on iOS.
══════════════════════════════ */
#chat {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;

  display: flex; flex-direction: column;
  gap: 26px;

  padding-top: 110px;   /* clear header */
  padding-bottom: 200px; /* generous — clears bar even with keyboard */
  padding-left: 16px; padding-right: 16px;

  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  touch-action: pan-y;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: #1c1c1c; border-radius: 4px; }

/* messages */
.msg {
  position: relative;
  max-width: 82%; width: fit-content;
  line-height: 1.85; padding-bottom: 4px; font-size: 1rem;
  flex-shrink: 0; /* never compress vertically */
}
.mt-text { display: block; white-space: pre-wrap; word-break: break-word; letter-spacing: 0.01em; }

.msg.usr {
  align-self: flex-end;
  animation: slideUp 0.28s var(--ez) both;
}
.msg.usr .mt-text {
  background: #1c1c1c; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px 18px 4px 18px; padding: 10px 16px; display: inline-block;
}
.msg.bot {
  align-self: flex-start;
  animation: slideUp 0.28s var(--ez) both;
}
.blbl {
  display: block; font-size: 0.56rem; letter-spacing: 2px;
  color: rgba(255,255,255,0.2); margin-bottom: 8px; text-transform: uppercase;
}

.cpbtn {
  position: absolute; right: 0; bottom: -20px;
  background: transparent; border: none; padding: 6px;
  cursor: pointer; opacity: 0.35;
  transition: opacity 0.2s;
}
.cpbtn svg { fill: #777; width: 14px; height: 14px; display: block; }
.cpbtn:active { opacity: 1; }

.spin {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.5);
  border-radius: 50%; margin: 4px 0 2px 2px;
  animation: spin 0.75s linear infinite;
}
.dots {
  display: inline-flex; align-items: center;
  gap: 4px; height: 1em; vertical-align: middle; margin-left: 2px;
}
.dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.4); display: inline-block;
  animation: dotB 1.1s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }

/* ══════════════════════════════
   INPUT BAR
   ─────────────────────────────
   position:fixed — anchors to the layout viewport bottom.

   ANDROID WEBVIEW KEYBOARD FIX:
   On Android WebView, when keyboard opens, the layout viewport
   shrinks. Fixed elements re-anchor to the new viewport bottom,
   which IS the keyboard top. So the bar naturally floats above
   the keyboard. This is correct behaviour — no JS needed for the bar.

   However, we use the visualViewport API to detect keyboard open
   and adjust ONLY the chat's scroll position, not any heights.

   DESKTOP: centered in space right of sidebar.
   MOBILE: full width.
══════════════════════════════ */
#bar {
  position: fixed; z-index: 200;

  /* desktop */
  left: calc(var(--sw) + (100vw - var(--sw)) / 2);
  transform: translateX(-50%);
  width: min(700px, calc(100vw - var(--sw) - 48px));
  bottom: max(18px, env(safe-area-inset-bottom, 18px));

  display: flex; align-items: flex-end; gap: 6px; padding: 8px 10px;

  background: rgba(12,12,12,0.94);
  border: 1px solid var(--bord); border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.9);

  transition: border-color 0.2s var(--ez);
  /* NO bottom transition on mobile — needs to follow keyboard instantly */
}
#bar:focus-within { border-color: rgba(255,255,255,0.22); }

body.col #bar {
  left: calc(var(--stw) + (100vw - var(--stw)) / 2);
  width: min(700px, calc(100vw - var(--stw) - 48px));
}

/* empty state: bar floats to center */
body.mt #bar { bottom: 32%; }

#inp {
  flex: 1; min-width: 0;
  background: transparent; border: none; color: #fff;
  font-family: var(--font); font-size: 1rem; line-height: 1.5;
  padding: 7px 8px; resize: none; max-height: 160px; overflow-y: auto;
  -webkit-user-select: text; user-select: text;
  outline: none !important; box-shadow: none !important;
}
#inp::placeholder { color: #3a3a3a; }
#inp:focus { outline: none !important; }

.ibtn {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 50%; border: none;
  cursor: pointer; background: transparent;
  transition: transform 0.18s var(--ezs);
  -webkit-appearance: none; appearance: none; outline: none;
}
.ibtn:active { opacity: 0.7; }

#micbtn { color: #555; }
#micbtn svg { fill: currentColor; width: 20px; height: 20px; transition: fill 0.2s; }
#micbtn:hover svg { fill: #bbb; }
#micbtn.lst { background: rgba(255,50,50,0.12); color: #ff4444; }
#micbtn.lst svg { animation: pulse 1s ease-in-out infinite; }

#sndbtn { background: #fff; animation: glow 3s ease-in-out infinite; }
#sndbtn:hover  { transform: scale(1.08); }
#sndbtn:active { transform: scale(0.92); }
#sndbtn svg { fill: #000; width: 19px; height: 19px; transform: translateX(1px); }
#sndbtn:disabled { animation: none; opacity: 0.35; pointer-events: none; }

/* scroll-to-bottom button */
#scrbtn {
  position: fixed; z-index: 150; left: 50%;
  bottom: 90px;
  transform: translateX(-50%) translateY(12px);
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(20,20,20,0.96);
  color: #888; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s var(--ez), transform 0.25s var(--ez);
}
#scrbtn.on { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
#scrbtn svg { fill: currentColor; width: 18px; height: 18px; }

/* voice toast */
#vtoast {
  position: fixed; z-index: 150; left: 50%; bottom: 82px;
  transform: translateX(-50%) translateY(8px);
  padding: 5px 14px; border-radius: 20px;
  background: rgba(255,40,40,0.12); border: 1px solid rgba(255,80,80,0.25);
  color: #ff6666; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
  opacity: 0; pointer-events: none;
  transition: opacity 0.22s var(--ez), transform 0.22s var(--ez);
}
#vtoast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════
   KEYFRAMES
══════════════════════════════ */
@keyframes shimmer  { to { background-position: -200% center; } }
@keyframes slideUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes dotB     { 0%,60%,100% { opacity:0.2; transform:translateY(0); } 30% { opacity:1; transform:translateY(-4px); } }
@keyframes pulse    { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.88); } }
@keyframes glow     { 0%,100% { box-shadow:0 0 0 rgba(255,255,255,0); } 50% { box-shadow:0 0 20px rgba(255,255,255,0.35); } }
@keyframes textGlow { 0%,100% { text-shadow:0 0 0 rgba(255,255,255,0); } 50% { text-shadow:0 0 20px rgba(255,255,255,0.5); } }

/* ══════════════════════════════
   MOBILE ≤ 700px
══════════════════════════════ */
@media (max-width: 700px) {

  #sb {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    height: 100% !important;
    width: min(82vw, 300px) !important;
    z-index: 1000 !important;
    background: rgba(8,8,8,0.97) !important;
    transform: translate3d(-110%, 0, 0) !important;
    transition: transform 0.35s cubic-bezier(0.1,0.9,0.2,1) !important;
    box-shadow: 8px 0 40px rgba(0,0,0,0.9);
  }
  #sb.open { transform: translate3d(0, 0, 0) !important; }
  #sb .sbf     { display: flex !important; }
  #sb .sbs     { display: none !important; }
  #sb.col .sbf { display: flex !important; }
  #sb.col .sbs { display: none !important; }

  .sbh { padding-top: max(18px, calc(18px + env(safe-area-inset-top, 0px))); }
  .ncbtn { min-height: 52px; font-size: 0.78rem; }

  #main { width: 100% !important; }

  #hdr {
    padding: 12px 12px 10px;
    padding-top: max(12px, calc(12px + env(safe-area-inset-top, 0px)));
  }
  .htitle { font-size: 1.05rem; }
  .hsub   { display: none; }

  /*
    MOBILE CHAT PADDING:
    padding-top: clears the mobile header
    padding-bottom: 200px — intentionally large so you can ALWAYS scroll
    to the top, and the last message is never hidden behind the keyboard.
  */
  #chat {
    padding-top: max(88px, calc(72px + env(safe-area-inset-top, 0px))) !important;
    padding-bottom: 200px !important;
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  #wlc { top: 38%; }
  .msg { max-width: 90%; font-size: 0.95rem; }

  /*
    MOBILE BAR:
    Full width, safe-area aware.
    position:fixed — when keyboard opens on Android WebView, the layout
    viewport shrinks, and fixed elements re-anchor to its new bottom edge
    which is the top of the keyboard. Bar stays above keyboard correctly.
    No JS manipulation of bar position needed.
  */
  #bar {
    left:   max(10px, env(safe-area-inset-left, 10px))  !important;
    right:  max(10px, env(safe-area-inset-right, 10px)) !important;
    width:  auto !important;
    max-width: none !important;
    transform: none !important;
    bottom: max(10px, env(safe-area-inset-bottom, 10px)) !important;
    border-radius: 20px; padding: 6px 8px;
    transition: border-color 0.2s var(--ez) !important;
  }

  body.mt #bar { bottom: 36% !important; }

  /* 16px PREVENTS iOS auto-zoom on input focus */
  #inp { font-size: 16px !important; }

  .ibtn    { width: 48px; height: 48px; }
  #menubtn { min-width: 48px; min-height: 48px; }
  .si      { min-height: 52px; padding: 12px 10px; }
  .si-t    { font-size: 0.83rem; }
  .cpbtn   { opacity: 0.45; padding: 8px; }

  #scrbtn { bottom: max(86px, calc(76px + env(safe-area-inset-bottom, 0px))); }
  #vtoast { bottom: max(78px, calc(68px + env(safe-area-inset-bottom, 0px))); }
}

@media (max-width: 370px) { .htitle { font-size: 0.9rem; letter-spacing: 0.16em; } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

<script>
document.addEventListener('DOMContentLoaded', function() {
'use strict';

/* ───── Markdown Renderer ───── */
function renderMD(text) {
  if (!text) return '';

  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // code blocks ```
  text = text.replace(/```([\s\S]*?)```/g, function(_, code) {
    return `<pre class="code-block"><code>${code}</code></pre>`;
  });

  // inline code `
  text = text.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');

  // bold **
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // italic *
  text = text.replace(/\*(?!\*)(.*?)\*(?!\*)/g, '<em>$1</em>');

  // line breaks
  text = text.replace(/\n/g, "<br>");

  return text;
}

/* ── refs ── */
var $chat = document.getElementById('chat');
var $wlc  = document.getElementById('wlc');
var $inp  = document.getElementById('inp');
var $snd  = document.getElementById('sndbtn');
var $mic  = document.getElementById('micbtn');
var $scr  = document.getElementById('scrbtn');
var $vt   = document.getElementById('vtoast');
var $sb   = document.getElementById('sb');
var $ov   = document.getElementById('overlay');
var $sbl  = document.getElementById('sbl');
var $nc   = document.getElementById('ncbtn');
var $snc  = document.getElementById('stripnc');
var $mt   = document.getElementById('mtrig');
var $md   = document.getElementById('mdrop');
var $ml   = document.getElementById('mlbl');
var $bar  = document.getElementById('bar');

/* ── state ── */
var hist  = [];
var sid   = null;
var up    = false;
var mdl   = 'llama-3.1-8b-instant';
var rafId = 0;
var recog = null;
var lstn  = false;

function isMobile() { return window.innerWidth <= 700; }

/* ══════════════════════════════════════════════════════════
   VISUAL VIEWPORT / KEYBOARD HANDLER
   ──────────────────────────────────────────────────────────
   This is the CORRECT solution for Android WebView keyboard issues.

   When the keyboard opens:
   • window.innerHeight shrinks (layout viewport shrinks)
   • visualViewport.height tells us the actual visible area height
   • We use this to pin #bar to the TOP of the keyboard

   When keyboard closes:
   • visualViewport.height == window.innerHeight again
   • We restore normal bar position

   IMPORTANT: We only move #bar. We NEVER change #chat's height
   or any other element. This is why scroll works independently.
══════════════════════════════════════════════════════════ */
var kbOpen     = false;
var initialWH  = window.innerHeight; /* locked at page load */

function onViewportChange() {
  if (!isMobile()) return;

  var vvh = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  var kbHeight = initialWH - vvh;

  if (kbHeight > 80) {
    kbOpen = true;

    $bar.style.bottom = (kbHeight + 8) + 'px';

    // 🔥 allow scrolling below keyboard
    $chat.style.paddingBottom = (kbHeight + 120) + 'px';

    setTimeout(function() {
      $chat.scrollTop = $chat.scrollHeight;
    }, 50);

  } else {
    kbOpen = false;

    $bar.style.removeProperty('bottom');

    // reset padding
    $chat.style.paddingBottom = '200px';
  }
}

window.addEventListener('orientationchange', function() {
  setTimeout(function() {
    initialWH = window.innerHeight;
    onViewportChange();
  }, 350);
}, { passive: true });

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', onViewportChange, { passive: true });
  window.visualViewport.addEventListener('scroll', onViewportChange, { passive: true });
} else {
  window.addEventListener('resize', onViewportChange, { passive: true });
}

/* ══════════════════════════════
   EMPTY / WELCOME
══════════════════════════════ */
function msgCount() {
  return $chat.querySelectorAll('.msg').length;
}

function syncEmpty() {
  var e = msgCount() === 0;
  document.body.classList.toggle('mt', e);
  $wlc.classList.toggle('hide', !e);
  $inp.placeholder = e ? 'Ask BLANK_' : 'Reply to BLANK_';
}

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
function openSB()  { $sb.classList.add('open');    $ov.classList.add('on'); }
function closeSB() { $sb.classList.remove('open'); $ov.classList.remove('on'); }

function toggleSB() {
  if (isMobile()) {
    $sb.classList.contains('open') ? closeSB() : openSB();
  } else {
    var c = $sb.classList.toggle('col');
    document.body.classList.toggle('col', c);
  }
}

document.getElementById('menubtn').addEventListener('click', toggleSB);
$ov.addEventListener('click', closeSB);

/* swipe left to close */
var _tx = 0, _ty = 0;
document.addEventListener('touchstart', function(e) {
  _tx = e.touches[0].clientX; _ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - _tx;
  var dy = Math.abs(e.changedTouches[0].clientY - _ty);
  if (dx < -52 && dy < 70 && $sb.classList.contains('open')) closeSB();
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if ($sb.classList.contains('open') && !$sb.contains(e.target)) e.preventDefault();
}, { passive: false });

/* ══════════════════════════════
   FETCH HELPER
══════════════════════════════ */
function fetchJSON(url, options) {
  return fetch(url, options)
    .then(function(r) {
      if (!r.ok) return {};
      return r.text().then(function(t) {
        try { return t ? JSON.parse(t) : {}; } catch(e) { return {}; }
      });
    })
    .catch(function() { return {}; });
}

/* ══════════════════════════════
   SESSIONS
══════════════════════════════ */
function loadSessions() {
  fetchJSON('/sessions', { credentials: 'include' }).then(function(d) {
    var arr = Array.isArray(d) ? d : (d.sessions || []);
    renderSessions(arr);
  });
}

function renderSessions(list) {
  var f = document.createDocumentFragment();
  if (!list || !list.length) {
    var p = document.createElement('div');
    p.className = 'sbl-empty';
    p.textContent = 'No chats yet';
    f.appendChild(p);
  } else {
    list.forEach(function(s) {
      var row = document.createElement('div');
      row.className = 'si' + (s.id === sid ? ' act' : '');

      var t = document.createElement('span');
      t.className = 'si-t'; t.textContent = s.title || 'Untitled';

      var d = document.createElement('button');
      d.className = 'si-d'; d.setAttribute('aria-label', 'Delete');
      d.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
      d.addEventListener('click', function(e) { e.stopPropagation(); delSession(s.id); });

      row.appendChild(t); row.appendChild(d);
      row.addEventListener('click', function() { loadSession(s.id); });
      f.appendChild(row);
    });
  }
  $sbl.innerHTML = '';
  $sbl.appendChild(f);
}

function newChat() {
  if (sid && msgCount() === 0) { closeSB(); return; }
  fetchJSON('/sessions/new', { method: 'POST', credentials: 'include' })
    .then(function(d) {
      sid  = (d && d.id) ? d.id : null;
      hist = [];
      clearChat();
      loadSessions();
    })
    .catch(function() {})
    .finally(function() { closeSB(); });
}

function loadSession(id) {
  fetchJSON('/sessions/' + id, { credentials: 'include' })
    .then(function(d) {
      sid  = (d && d.id) ? d.id : id;
      var msgs = Array.isArray(d) ? d : (d.messages || d.history || d.chat || []);
      hist = msgs.map(function(m) {
        return { role: m.role, content: m.content || m.text || m.message || '' };
      });
      clearChat();
      msgs.forEach(function(m) {
        var txt = m.content || m.text || m.message || '';
        if (m.role === 'user') addUserI(txt); else addBotI(txt);
      });
      syncEmpty();
      scrollBot(true);
      loadSessions();
    })
    .catch(function() {})
    .finally(function() { closeSB(); });
}

function delSession(id) {
  fetch('/sessions/' + id, { method: 'DELETE', credentials: 'include' })
    .then(function() {
      if (sid === id) { sid = null; hist = []; clearChat(); }
      loadSessions();
    })
    .catch(function() {});
}

$nc.addEventListener('click', newChat);
if ($snc) $snc.addEventListener('click', newChat);

/* ══════════════════════════════
   SCROLL
   #chat is position:absolute and always fills #main.
   Its scrollHeight = full content height, always correct.
   We never modify its size — it scrolls freely at all times.
══════════════════════════════ */
var _sd = 0;
$chat.addEventListener('scroll', function() {
  clearTimeout(_sd);
  _sd = setTimeout(function() {
    var dist = $chat.scrollHeight - $chat.scrollTop - $chat.clientHeight;
    up = dist > 80;
    $scr.classList.toggle('on', up);
  }, 50);
}, { passive: true });

/* When user touches chat, they intend to scroll — stop auto-scroll */
$chat.addEventListener('touchstart', function() { up = true; }, { passive: true });
$scr.addEventListener('click', function() { scrollBot(true); });

function scrollBot(force) {
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(function() {
    $chat.scrollTop = $chat.scrollHeight;
    if (force) { up = false; $scr.classList.remove('on'); }
  });
}
function autoScroll() {
  const nearBottom =
    $chat.scrollHeight - $chat.scrollTop - $chat.clientHeight < 120;

  if (!up || nearBottom) {
    scrollBot(false);
  }
}

/* ══════════════════════════════
   TEXTAREA
══════════════════════════════ */
function resize() {
  $inp.style.height = 'auto';
  $inp.style.height = Math.min($inp.scrollHeight, 160) + 'px';
}
$inp.addEventListener('input', resize, { passive: true });
$inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ══════════════════════════════
   SEND
══════════════════════════════ */
$snd.addEventListener('click', send);

function send() {
  var text = $inp.value.trim();
  if (!text || $snd.disabled) return;

  var doSend = function() {
    stopVoice();
    addUser(text);
    $inp.value = ''; resize();
    $snd.disabled = true;
    scrollBot(true);

    /*
      KEYBOARD: blur to dismiss keyboard after send.
      We never re-focus — prevents keyboard re-opening.
    */
    $inp.blur();

    var lid = showSpin();
    fetchJSON('/chat', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: hist, model: mdl, session_id: sid })
    })
    .then(function(d) {
      removeSpin(lid);
      var reply = (d && d.reply) ? d.reply.trim() : '';
      if (reply) {
        hist.push({ role: 'user',      content: text  });
        hist.push({ role: 'assistant', content: reply });
        typeBot(reply);
      } else {
        typeBot('Connection lost or empty response.');
      }
      loadSessions();
    })
    .catch(function() {
      removeSpin(lid);
      typeBot('An error occurred. Please check your connection.');
    })
    .finally(function() {
      $snd.disabled = false;
      /* NO focus — keyboard must stay down */
    });
  };

  if (!sid) {
    fetchJSON('/sessions/new', { method: 'POST', credentials: 'include' })
      .then(function(d) { if (d && d.id) sid = d.id; })
      .catch(function() {})
      .finally(doSend);
  } else {
    doSend();
  }
}

/* ══════════════════════════════
   CHAT HELPERS
══════════════════════════════ */
function clearChat() {
  $chat.querySelectorAll('.msg').forEach(function(el) { el.remove(); });
  up = false; $scr.classList.remove('on');
  syncEmpty();
}

function addUserI(text) {
  var el = mk('div', 'msg usr');
  el.innerHTML = '<span class="mt-text">' + esc(text) + '</span>' + cpb();
  $chat.appendChild(el);
}
function addBotI(text) {
  var el = mk('div', 'msg bot');
  el.innerHTML = '<span class="blbl">BLANK_</span><span class="mt-text">' + renderMD(text) + '</span>' + cpb();
  $chat.appendChild(el);
}

function addUser(text) {
  var el = mk('div', 'msg usr');
  var sp = mk('span', 'mt-text');
  var d  = makeDots();
  el.appendChild(sp); el.appendChild(d);
  $chat.appendChild(el);
  syncEmpty(); autoScroll();
  var i = 0;
  (function step() {
    if (i < text.length) {
      sp.textContent += text.slice(i, i + 2); i += 2;
      autoScroll(); requestAnimationFrame(step);
    } else {
      d.remove(); el.insertAdjacentHTML('beforeend', cpb());
    }
  })();
}

function showSpin() {
  var id = 'sp' + Date.now();
  var el = mk('div', 'msg bot'); el.id = id;
  el.innerHTML = '<span class="blbl">BLANK_</span><div class="spin"></div>';
  $chat.appendChild(el); autoScroll(); return id;
}
function removeSpin(id) { var el = document.getElementById(id); if (el) el.remove(); }

function typeBot(text) {
  up = false;
  var el   = mk('div', 'msg bot');
  var lbl  = mk('span', 'blbl'); lbl.textContent = 'BLANK_';
  var spin = mk('div', 'spin');
  var sp   = mk('span', 'mt-text');
  var d    = makeDots();
  el.appendChild(lbl); el.appendChild(spin); el.appendChild(sp); el.appendChild(d);
  $chat.appendChild(el); autoScroll();
  var i = 0, last = 0;
  (function step() {
    if (i < text.length) {
      if (i === 0 && spin.parentNode) spin.remove();
      sp.textContent += text.slice(i, i + 3); i += 3;
      var now = Date.now();
      if (now - last > 60) { autoScroll(); last = now; }
      setTimeout(step, 14);
    } else {
      d.remove();
      sp.innerHTML = renderMD(text);
      el.insertAdjacentHTML('beforeend', cpb());
      autoScroll();
    }
  })();
}

function makeDots() {
  var w = mk('span', 'dots');
  w.innerHTML = '<span></span><span></span><span></span>';
  return w;
}
function mk(tag, cls) { var e = document.createElement(tag); e.className = cls; return e; }

/* delegated copy — one listener on #chat, works on all messages */
function cpb()  { return '<button class="cpbtn" aria-label="Copy">' + cpico() + '</button>'; }
function cpico(){ return '<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>'; }
function okico(){ return '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#00ff87"/></svg>'; }

$chat.addEventListener('click', function(e) {
  var btn = e.target.closest('.cpbtn'); if (!btn) return;
  var sp  = btn.closest('.msg') && btn.closest('.msg').querySelector('.mt-text');
  if (!sp) return;
  var txt  = sp.textContent;
  var done = function() { btn.innerHTML = okico(); setTimeout(function() { btn.innerHTML = cpico(); }, 2000); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(function() { fbcp(txt, done); });
  } else { fbcp(txt, done); }
});

function fbcp(txt, cb) {
  var ta = document.createElement('textarea');
  ta.value = txt; ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  ta.remove();
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════
   MODEL DROPDOWN
══════════════════════════════ */
$mt.addEventListener('click', function(e) {
  e.stopPropagation();
  var open = $md.classList.toggle('open');
  $mt.classList.toggle('open', open);
  if (open) {
    var r = $mt.getBoundingClientRect();
    $md.style.top  = (r.bottom + 6) + 'px';
    $md.style.left = (r.left + r.width / 2) + 'px';
    $md.style.transform = 'translateX(-50%)';
    requestAnimationFrame(function() {
      var mr = $md.getBoundingClientRect();
      if (mr.right > window.innerWidth - 8) {
        $md.style.left = (window.innerWidth - mr.width - 8) + 'px';
        $md.style.transform = 'none';
      }
      if (mr.left < 8) { $md.style.left = '8px'; $md.style.transform = 'none'; }
    });
  }
});
$md.addEventListener('click', function(e) {
  var o = e.target.closest('.mopt'); if (!o) return;
  document.querySelectorAll('.mopt').forEach(function(x) { x.classList.remove('sel'); });
  o.classList.add('sel');
  mdl = o.dataset.v;
  $ml.textContent = o.childNodes[0].textContent.trim();
  $md.classList.remove('open'); $mt.classList.remove('open');
});
document.addEventListener('click', function() {
  $md.classList.remove('open'); $mt.classList.remove('open');
}, { passive: true });

/* ══════════════════════════════
   VOICE
══════════════════════════════ */
$mic.addEventListener('click', toggleVoice);
function toggleVoice() {
  if (lstn) { stopVoice(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { typeBot('Voice not supported in this browser.'); return; }
  recog = new SR();
  recog.lang = 'en-US'; recog.interimResults = true; recog.continuous = false;
  recog.onstart  = function() { lstn = true;  $mic.classList.add('lst');    $vt.classList.add('on'); };
  recog.onend    = function() { lstn = false; $mic.classList.remove('lst'); $vt.classList.remove('on'); recog = null; };
  recog.onerror  = function() { lstn = false; $mic.classList.remove('lst'); $vt.classList.remove('on'); recog = null; };
  recog.onresult = function(e) {
    var fin = '', int = '';
    for (var i = 0; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) fin += t; else int += t;
    }
    $inp.value = fin || int; resize();
  };
  try { recog.start(); } catch(e) { recog = null; }
}
function stopVoice() { if (recog) { try { recog.stop(); } catch(e) {} } }

/* ══════════════════════════════
   INIT
══════════════════════════════ */
syncEmpty();
loadSessions();

}); // closes DOMContentLoaded

</script>
