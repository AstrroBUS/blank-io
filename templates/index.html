<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BLANK_</title>
<style>
/* ══ TOKENS ══════════════════════════════════════════════ */
:root {
  --sw:   280px;
  --stw:  56px;
  --bg:   #000;
  --sbg:  #0a0a0a;
  --bord: rgba(255,255,255,0.07);
  --font: -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --ez:   cubic-bezier(0.25,0.46,0.45,0.94);
  --ezs:  cubic-bezier(0.34,1.56,0.64,1);
}

/* ══ RESET ═══════════════════════════════════════════════ */
*,*::before,*::after{
  box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

html{
  height:100%;
  height: -webkit-fill-available;
}
body{
  height:100%;
  height:-webkit-fill-available;
  width:100%;
  overflow:hidden;
  background:var(--bg);
  color:#fff;
  font-family:var(--font);
  display:flex;
  flex-direction:column;
}

/* ══ APP SHELL ═══════════════════════════════════════════ */
#app{
  display:flex;
  flex:1;
  height:100%;
  width:100%;
  min-height:0;
  overflow:hidden;
  position:relative;
}

/* ══ OVERLAY ═════════════════════════════════════════════ */
#overlay{
  position:absolute;
  inset:0;
  z-index:900 !important; /* Forces overlay under sidebar but above everything else */
  background:rgba(0,0,0,0.72);
  opacity:0;pointer-events:none;
  -webkit-transition:opacity 0.28s var(--ez);
  transition:opacity 0.28s var(--ez);
}
#overlay.on{opacity:1;pointer-events:all;}

/* ══ SIDEBAR ═════════════════════════════════════════════ */
#sb{
  position:relative;
  z-index:1000 !important; /* Bulletproof stacking against main header */
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-flex-shrink:0;flex-shrink:0;
  width:var(--sw);height:100%;
  background:var(--sbg);
  border-right:1px solid var(--bord);
  overflow:hidden;
  -webkit-transition:width 0.32s var(--ez);
  transition:width 0.32s var(--ez);
}
#sb.col{width:var(--stw);}
#sb.col .sbf{display:none;}
#sb.col .sbs{display:-webkit-box;display:-webkit-flex;display:flex;}

.sbf{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  height:100%;min-height:0;
}

.sbh{
  -webkit-flex-shrink:0;flex-shrink:0;
  padding:20px 14px 14px;
  /* SAFE WEBVIEW FALLBACK: no max(), purely calc to avoid CSS parsing drops */
  padding-top:calc(20px + env(safe-area-inset-top, 0px));
  border-bottom:1px solid var(--bord);
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  gap:10px;
}

.sbbrand{
  font-size:1.1rem;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  -webkit-animation:shimmer 8s linear infinite;
  animation:shimmer 8s linear infinite;
}

.ncbtn{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:8px;width:100%;
  padding:13px 13px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  color:#bbb;font-family:var(--font);
  font-size:0.75rem;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;
  min-height:48px;
  -webkit-transition:background 0.2s var(--ez),color 0.2s var(--ez);
  transition:background 0.2s var(--ez),color 0.2s var(--ez);
  -webkit-appearance:none;appearance:none;
  outline:none;
}
.ncbtn svg{fill:currentColor;width:15px;height:15px;-webkit-flex-shrink:0;flex-shrink:0;}
.ncbtn:hover{background:rgba(255,255,255,0.10);color:#fff;}
.ncbtn:active{background:rgba(255,255,255,0.14);}

.sbl{
  -webkit-flex:1;flex:1;
  overflow-y:auto;overflow-x:hidden;
  padding:6px 8px;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  gap:2px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.sbl::-webkit-scrollbar{width:3px;}
.sbl::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
.sbl-empty{color:#282828;font-size:0.7rem;padding:14px 8px;letter-spacing:0.08em;}

.si{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:8px;padding:12px 10px;border-radius:8px;
  cursor:pointer;min-height:48px;
  -webkit-transition:background 0.16s var(--ez);
  transition:background 0.16s var(--ez);
  -webkit-user-select:none;user-select:none;
}
.si:hover{background:rgba(255,255,255,0.05);}
.si.act{background:rgba(255,255,255,0.09);}
.si:active{background:rgba(255,255,255,0.13);}
.si-t{
  -webkit-flex:1;flex:1;font-size:0.8rem;color:#666;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  -webkit-transition:color 0.16s var(--ez);transition:color 0.16s var(--ez);
}
.si.act .si-t{color:#fff;}
.si-d{
  -webkit-flex-shrink:0;flex-shrink:0;
  background:transparent;border:none;color:#2a2a2a;
  padding:7px;cursor:pointer;border-radius:6px;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  -webkit-transition:color 0.18s var(--ez);transition:color 0.18s var(--ez);
  min-width:36px;min-height:36px;
}
.si-d svg{fill:currentColor;width:16px;height:16px;display:block;}
.si-d:hover{color:#ff4444;}
.si-d:active{opacity:0.7;}

.sbfoot{
  -webkit-flex-shrink:0;flex-shrink:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  padding:12px 14px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
  border-top:1px solid var(--bord);
}
.sbuser{font-size:0.7rem;color:#3a3a3a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;-webkit-flex:1;flex:1;min-width:0;margin-right:8px;}
.logout{
  -webkit-flex-shrink:0;flex-shrink:0;
  display:-webkit-inline-box;display:-webkit-inline-flex;display:inline-flex;
  -webkit-align-items:center;align-items:center;
  padding:6px 10px;background:transparent;
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;
  color:#3a3a3a;font-family:var(--font);font-size:0.56rem;letter-spacing:0.12em;
  text-transform:uppercase;text-decoration:none;
  -webkit-transition:color 0.2s,border-color 0.2s;transition:color 0.2s,border-color 0.2s;
}
.logout:hover{color:#bbb;border-color:rgba(255,255,255,0.2);}

/* strip */
.sbs{
  display:none;-webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  padding:14px 0;gap:14px;height:100%;
}
.sbs-btn{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  width:36px;height:36px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:10px;
  color:#666;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;
  -webkit-transition:background 0.2s,color 0.2s;transition:background 0.2s,color 0.2s;
}
.sbs-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.sbs-btn svg{fill:currentColor;width:16px;height:16px;}
.sbs-brand{
  writing-mode:vertical-rl;-webkit-transform:rotate(180deg);transform:rotate(180deg);
  font-size:0.52rem;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  -webkit-animation:shimmer 8s linear infinite;animation:shimmer 8s linear infinite;-webkit-flex:1;flex:1;
}

/* ══ MAIN ════════════════════════════════════════════════ */
#main{
  -webkit-flex:1;flex:1;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  min-width:0;height:100%;overflow:hidden;position:relative;
  z-index:1;
}

#hdr{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:10px;
  padding:14px 16px 12px;
  padding-top:calc(14px + env(safe-area-inset-top, 0px));
  background:linear-gradient(to bottom,rgba(0,0,0,0.98) 55%,transparent);
}

#menubtn{
  -webkit-flex-shrink:0;flex-shrink:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  min-width:44px;min-height:44px;
  background:transparent;border:none;color:#555;cursor:pointer;border-radius:10px;
  -webkit-transition:color 0.2s var(--ez);transition:color 0.2s var(--ez);
}
#menubtn:hover{color:#fff;}
#menubtn:active{opacity:0.7;}
#menubtn svg{fill:currentColor;width:22px;height:22px;display:block;}

.hc{
  -webkit-flex:1;flex:1;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
}
.htitle{
  font-size:1.35rem;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  -webkit-animation:shimmer 8s linear infinite;animation:shimmer 8s linear infinite;
}
.hsub{font-size:0.5rem;letter-spacing:0.22em;color:#444;text-transform:uppercase;margin-top:1px;}

.mpill{position:relative;margin-top:6px;}
.mtrig{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:4px;padding:5px 10px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;
  color:#666;font-family:var(--font);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;-webkit-user-select:none;user-select:none;
  -webkit-transition:color 0.2s,border-color 0.2s;transition:color 0.2s,border-color 0.2s;
}
.mtrig:hover{color:#bbb;border-color:rgba(255,255,255,0.2);}
.mtrig svg{fill:currentColor;width:10px;height:10px;-webkit-transition:-webkit-transform 0.22s var(--ez);transition:transform 0.22s var(--ez);}
.mtrig.open svg{-webkit-transform:rotate(180deg);transform:rotate(180deg);}

.mdrop{
  position:fixed;z-index:9999;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  gap:2px;padding:6px;min-width:170px;
  background:#141414;border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.9);
  opacity:0;pointer-events:none;
  -webkit-transform:translateY(-6px);transform:translateY(-6px);
  -webkit-transition:opacity 0.22s var(--ez),-webkit-transform 0.22s var(--ez);
  transition:opacity 0.22s var(--ez),transform 0.22s var(--ez);
}
.mdrop.open{opacity:1;pointer-events:all;-webkit-transform:translateY(0);transform:translateY(0);}
.mopt{
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  padding:10px 12px;border-radius:9px;
  font-family:var(--font);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;
  color:#666;cursor:pointer;
  -webkit-transition:background 0.15s,color 0.15s;transition:background 0.15s,color 0.15s;
}
.mopt:hover{background:rgba(255,255,255,0.07);color:#fff;}
.mopt.sel{color:#fff;}
.mdot{width:7px;height:7px;border-radius:50%;background:#00ff87;box-shadow:0 0 8px rgba(0,255,135,0.8);opacity:0;-webkit-flex-shrink:0;flex-shrink:0;-webkit-transition:opacity 0.18s;transition:opacity 0.18s;}
.mopt.sel .mdot{opacity:1;}
.hr{-webkit-flex-shrink:0;flex-shrink:0;min-width:44px;}

/* ══ WELCOME / READY ═════════════════════════════════════ */
#wlc{
  position:absolute;
  top:45%; left:50%;
  -webkit-transform:translate(-50%, -50%); transform:translate(-50%, -50%);
  text-align:center; pointer-events:none;
  -webkit-user-select:none; user-select:none; z-index:10;
  -webkit-animation:wlcIn 0.4s var(--ez) both;
  animation:wlcIn 0.4s var(--ez) both;
  width:100%;
}
#wlc span{font-size:2rem;font-weight:600;color:#fff;letter-spacing:-0.01em;}
#wlc.hide{
  -webkit-animation:wlcOut 0.3s var(--ez) forwards;
  animation:wlcOut 0.3s var(--ez) forwards;
}

@-webkit-keyframes wlcIn {
  from { opacity: 0; -webkit-transform: translate(-50%, -40%); }
  to   { opacity: 1; -webkit-transform: translate(-50%, -50%); }
}
@keyframes wlcIn {
  from { opacity: 0; transform: translate(-50%, -40%); }
  to   { opacity: 1; transform: translate(-50%, -50%); }
}
@-webkit-keyframes wlcOut {
  from { opacity: 1; -webkit-transform: translate(-50%, -50%); }
  to   { opacity: 0; -webkit-transform: translate(-50%, -60%); }
}
@keyframes wlcOut {
  from { opacity: 1; transform: translate(-50%, -50%); }
  to   { opacity: 0; transform: translate(-50%, -60%); }
}

/* ══ CHAT ════════════════════════════════════════════════ */
#chat{
  -webkit-flex:1;flex:1;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  gap:26px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  -webkit-touch-callout:none;
  touch-action:pan-y;
  padding:130px 16px 110px;
}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:4px;}

/* messages */
.msg{position:relative;max-width:82%;width:-webkit-fit-content;width:fit-content;line-height:1.85;padding-bottom:4px;font-size:1rem;}
.mt-text{display:block;white-space:pre-wrap;word-break:break-word;letter-spacing:0.01em;}
.msg.usr{
  -webkit-align-self:flex-end;align-self:flex-end;
  -webkit-animation:slideUp 0.28s var(--ez) both;animation:slideUp 0.28s var(--ez) both;
}
.msg.usr .mt-text{
  background:#1c1c1c;border:1px solid rgba(255,255,255,0.08);
  border-radius:18px 18px 4px 18px;padding:10px 16px;display:inline-block;
}
.msg.bot{
  -webkit-align-self:flex-start;align-self:flex-start;
  -webkit-animation:slideUp 0.28s var(--ez) both;animation:slideUp 0.28s var(--ez) both;
}
.blbl{display:block;font-size:0.56rem;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:8px;text-transform:uppercase;}

.cpbtn{
  position:absolute;right:0;bottom:-20px;
  background:transparent;border:none;padding:6px;cursor:pointer;opacity:0.35;
  -webkit-transition:opacity 0.2s;transition:opacity 0.2s;
}
.cpbtn svg{fill:#777;width:14px;height:14px;display:block;}
.cpbtn:active{opacity:1;}

/* spinner */
.spin{
  width:20px;height:20px;
  border:2px solid rgba(255,255,255,0.08);
  border-top-color:rgba(255,255,255,0.5);
  border-radius:50%;
  margin:4px 0 2px 2px;
  -webkit-animation:spin 0.75s linear infinite;
  animation:spin 0.75s linear infinite;
}

/* dots */
.dots{display:-webkit-inline-box;display:-webkit-inline-flex;display:inline-flex;-webkit-align-items:center;align-items:center;gap:4px;height:1em;vertical-align:middle;margin-left:2px;}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);display:inline-block;-webkit-animation:dotB 1.1s ease-in-out infinite;animation:dotB 1.1s ease-in-out infinite;}
.dots span:nth-child(2){-webkit-animation-delay:0.18s;animation-delay:0.18s;}
.dots span:nth-child(3){-webkit-animation-delay:0.36s;animation-delay:0.36s;}

/* ══ INPUT BAR ═══════════════════════════════════════════ */
#bar{
  position:fixed;z-index:200;
  left:calc(var(--sw) + (100vw - var(--sw))/2);
  -webkit-transform:translateX(-50%);transform:translateX(-50%);
  width:calc(100vw - var(--sw) - 56px);
  max-width:700px;
  bottom:18px;
  bottom:calc(18px + env(safe-area-inset-bottom, 0px));
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:flex-end;align-items:flex-end;
  gap:6px;padding:8px 10px;
  background:rgba(14,14,14,0.96);
  border:1px solid var(--bord);border-radius:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.8);
  -webkit-transition:border-color 0.2s var(--ez),bottom 0.38s var(--ez);
  transition:border-color 0.2s var(--ez),bottom 0.38s var(--ez);
}
#bar:focus-within{border-color:rgba(255,255,255,0.2);}
body.col #bar{
  left:calc(var(--stw) + (100vw - var(--stw))/2);
  width:calc(100vw - var(--stw) - 56px);
}

#inp{
  -webkit-flex:1;flex:1;
  min-width:0;background:transparent;border:none;color:#fff;
  font-family:var(--font);
  font-size:1rem;
  line-height:1.5;
  padding:7px 8px;resize:none;max-height:160px;overflow-y:auto;
  -webkit-user-select:text;user-select:text;
}
#inp::placeholder{color:#3a3a3a;}

.ibtn{
  -webkit-flex-shrink:0;flex-shrink:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;border:none;
  cursor:pointer;background:transparent;
  -webkit-transition:-webkit-transform 0.18s var(--ezs);transition:transform 0.18s var(--ezs);
  -webkit-appearance:none;appearance:none;
}
.ibtn:active{opacity:0.7;}

#micbtn{color:#555;}
#micbtn svg{fill:currentColor;width:20px;height:20px;-webkit-transition:fill 0.2s;transition:fill 0.2s;}
#micbtn:hover svg{fill:#bbb;}
#micbtn.lst{background:rgba(255,50,50,0.12);color:#ff4444;}
#micbtn.lst svg{-webkit-animation:pulse 1s ease-in-out infinite;animation:pulse 1s ease-in-out infinite;}

#sndbtn{
  background:#fff;
  -webkit-animation:glow 3s ease-in-out infinite;
  animation:glow 3s ease-in-out infinite;
}
#sndbtn:hover{-webkit-transform:scale(1.08);transform:scale(1.08);}
#sndbtn:active{-webkit-transform:scale(0.92);transform:scale(0.92);}
#sndbtn svg{fill:#000;width:19px;height:19px;-webkit-transform:translateX(1px);transform:translateX(1px);}
#sndbtn:disabled{-webkit-animation:none;animation:none;opacity:0.35;pointer-events:none;}

/* scroll btn */
#scrbtn{
  position:fixed;z-index:100;left:50%;
  bottom:90px;
  -webkit-transform:translateX(-50%) translateY(12px);transform:translateX(-50%) translateY(12px);
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);background:rgba(24,24,24,0.95);
  color:#888;cursor:pointer;
  opacity:0;pointer-events:none;
  -webkit-transition:opacity 0.25s var(--ez),-webkit-transform 0.25s var(--ez);
  transition:opacity 0.25s var(--ez),transform 0.25s var(--ez);
}
#scrbtn.on{opacity:1;pointer-events:all;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
#scrbtn svg{fill:currentColor;width:18px;height:18px;}

/* voice toast */
#vtoast{
  position:fixed;z-index:100;left:50%;
  bottom:82px;
  -webkit-transform:translateX(-50%) translateY(8px);transform:translateX(-50%) translateY(8px);
  padding:5px 14px;border-radius:20px;
  background:rgba(255,40,40,0.12);border:1px solid rgba(255,80,80,0.25);
  color:#ff6666;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  opacity:0;pointer-events:none;
  -webkit-transition:opacity 0.22s var(--ez),-webkit-transform 0.22s var(--ez);
  transition:opacity 0.22s var(--ez),transform 0.22s var(--ez);
