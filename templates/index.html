<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BLANK_</title>
<style>
/* ══ TOKENS ══════════════════════════════════════════════ */
:root {
  --sw:    280px;   /* sidebar width */
  --stw:   56px;    /* strip width   */
  --bg:    #000;
  --sbg:   #0a0a0a;
  --bord:  rgba(255,255,255,0.07);
  --font:  "SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --ez:    cubic-bezier(0.25,0.46,0.45,0.94);
  --ezs:   cubic-bezier(0.34,1.56,0.64,1);
  --st:    env(safe-area-inset-top,0px);
  --sb:    env(safe-area-inset-bottom,0px);
  --sl:    env(safe-area-inset-left,0px);
  --sr:    env(safe-area-inset-right,0px);
}

/* ══ RESET ═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:var(--font);}
body{position:fixed;inset:0;display:flex;flex-direction:column;}

/* ══ APP SHELL ═══════════════════════════════════════════ */
#app{display:flex;flex:1;overflow:hidden;position:relative;min-height:0;}

/* ══ OVERLAY ═════════════════════════════════════════════ */
#overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.7);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity 0.28s var(--ez);
}
#overlay.on{opacity:1;pointer-events:all;}

/* ══ SIDEBAR ═════════════════════════════════════════════ */
#sb{
  /* desktop: inline panel */
  position:relative;z-index:10;
  display:flex;flex-direction:column;flex-shrink:0;
  width:var(--sw);height:100%;
  background:var(--sbg);border-right:1px solid var(--bord);
  overflow:hidden;
  transition:width 0.32s var(--ez);
  will-change:width;
}
#sb.col{width:var(--stw);}
#sb.col .sbf{display:none;}
#sb.col .sbs{display:flex;}

/* ── full panel ── */
.sbf{display:flex;flex-direction:column;height:100%;min-height:0;}

.sbh{
  flex-shrink:0;
  /* safe-area on top for notch devices */
  padding:max(20px,calc(var(--st)+14px)) 14px 14px;
  border-bottom:1px solid var(--bord);
  display:flex;flex-direction:column;gap:10px;
}

.sbbrand{
  font-size:1.1rem;font-weight:800;letter-spacing:0.28em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 8s linear infinite;
}

/* NEW CHAT — always fully visible, never clipped */
.ncbtn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:12px 13px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  color:#bbb;font-family:var(--font);font-size:0.73rem;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;flex-shrink:0;
  transition:background 0.2s var(--ez),color 0.2s var(--ez),transform 0.15s var(--ezs);
  -webkit-appearance:none;appearance:none;
}
.ncbtn svg{fill:currentColor;width:14px;height:14px;flex-shrink:0;}
.ncbtn:hover{background:rgba(255,255,255,0.10);color:#fff;}
.ncbtn:active{transform:scale(0.96);}

/* sessions scroll area */
.sbl{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.sbl::-webkit-scrollbar{width:3px;}
.sbl::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}

.sbl-empty{color:#282828;font-size:0.7rem;padding:14px 8px;letter-spacing:0.08em;}

.si{
  display:flex;align-items:center;gap:8px;padding:11px 10px;border-radius:8px;
  cursor:pointer;min-height:46px;
  transition:background 0.16s var(--ez);
  -webkit-user-select:none;user-select:none;
}
.si:hover{background:rgba(255,255,255,0.05);}
.si.act{background:rgba(255,255,255,0.09);}
.si:active{background:rgba(255,255,255,0.12);}
.si-t{flex:1;font-size:0.8rem;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color 0.16s var(--ez);}
.si.act .si-t{color:#fff;}
.si-d{flex-shrink:0;background:transparent;border:none;color:#2a2a2a;padding:6px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:color 0.18s var(--ez),transform 0.15s var(--ezs);}
.si-d svg{fill:currentColor;width:15px;height:15px;display:block;}
.si-d:hover{color:#ff4444;}
.si-d:active{transform:scale(0.85);}

.sbfoot{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;padding-bottom:max(12px,calc(var(--sb)+6px));
  border-top:1px solid var(--bord);
}
.sbuser{font-size:0.7rem;color:#3a3a3a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;margin-right:8px;}
.logout{
  flex-shrink:0;display:inline-flex;align-items:center;
  padding:5px 10px;background:transparent;
  border:1px solid rgba(255,255,255,0.08);border-radius:8px;
  color:#3a3a3a;font-family:var(--font);font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;
  text-decoration:none;transition:color 0.2s var(--ez),border-color 0.2s var(--ez);
}
.logout:hover{color:#bbb;border-color:rgba(255,255,255,0.2);}

/* ── strip (desktop collapsed) ── */
.sbs{
  display:none;flex-direction:column;align-items:center;
  padding:14px 0;gap:14px;height:100%;
}
.sbs-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:10px;
  color:#666;cursor:pointer;flex-shrink:0;
  transition:background 0.2s var(--ez),color 0.2s var(--ez);
}
.sbs-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.sbs-btn svg{fill:currentColor;width:16px;height:16px;}
.sbs-brand{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:0.52rem;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 8s linear infinite;flex:1;
}

/* ══ MAIN ════════════════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden;position:relative;}

/* ── header ── */
#hdr{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:10px;
  padding:max(14px,calc(var(--st)+10px)) 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.98) 55%,transparent);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
}

#menubtn{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;
  background:transparent;border:none;color:#555;cursor:pointer;border-radius:10px;
  transition:color 0.2s var(--ez),transform 0.15s var(--ezs);
}
#menubtn:hover{color:#fff;}
#menubtn:active{transform:scale(0.88);}
#menubtn svg{fill:currentColor;width:22px;height:22px;display:block;}

.hc{flex:1;display:flex;flex-direction:column;align-items:center;}
.htitle{
  font-size:1.35rem;font-weight:800;letter-spacing:0.3em;text-transform:uppercase;
  background:linear-gradient(110deg,#555 30%,#fff 50%,#555 70%);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 8s linear infinite;
}
.hsub{font-size:0.5rem;letter-spacing:0.22em;color:#444;text-transform:uppercase;margin-top:1px;}

/* model pill */
.mpill{position:relative;margin-top:6px;}
.mtrig{
  display:flex;align-items:center;gap:4px;padding:5px 10px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;
  color:#666;font-family:var(--font);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;-webkit-user-select:none;user-select:none;
  transition:color 0.2s var(--ez),border-color 0.2s var(--ez);
}
.mtrig:hover{color:#bbb;border-color:rgba(255,255,255,0.2);}
.mtrig svg{fill:currentColor;width:10px;height:10px;transition:transform 0.22s var(--ez);}
.mtrig.open svg{transform:rotate(180deg);}

.mdrop{
  position:fixed;z-index:9999;
  display:flex;flex-direction:column;gap:2px;padding:6px;min-width:170px;
  background:#141414;border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.9);
  opacity:0;pointer-events:none;
  transform:translateY(-6px);
  transition:opacity 0.22s var(--ez),transform 0.22s var(--ez);
}
.mdrop.open{opacity:1;pointer-events:all;transform:translateY(0);}
.mopt{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-radius:9px;
  font-family:var(--font);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;
  color:#666;cursor:pointer;transition:background 0.15s var(--ez),color 0.15s var(--ez);
}
.mopt:hover{background:rgba(255,255,255,0.07);color:#fff;}
.mopt.sel{color:#fff;}
.mdot{width:7px;height:7px;border-radius:50%;background:#00ff87;box-shadow:0 0 8px rgba(0,255,135,0.8);opacity:0;flex-shrink:0;transition:opacity 0.18s var(--ez);}
.mopt.sel .mdot{opacity:1;}
.hr{flex-shrink:0;min-width:44px;}

/* ── chat ── */
#chat{
  flex:1;display:flex;flex-direction:column;gap:26px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;
  /* top = header height, bottom = input bar + safe-area */
  padding:130px max(16px,calc((100% - 700px)/2)) max(110px,calc(var(--sb)+100px));
}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:4px;}

/* ─ EMPTY STATE ─
   When #chat has class .mt (empty), center #welcome inside it.
   We never touch padding-top/bottom when empty — flex centering handles it. */
#chat.mt{
  align-items:center;justify-content:center;
  padding-top:0 !important;padding-bottom:0 !important;
  overflow:hidden;
}

/* welcome */
#wlc{
  text-align:center;pointer-events:none;-webkit-user-select:none;user-select:none;
  animation:fadeUp 0.45s var(--ez) both;
}
#wlc span{font-size:2rem;font-weight:600;color:#fff;letter-spacing:-0.01em;}

/* messages */
.msg{position:relative;max-width:82%;width:fit-content;line-height:1.85;padding-bottom:4px;font-size:1rem;}
.mt-text{display:block;white-space:pre-wrap;word-break:break-word;letter-spacing:0.01em;}
.msg.usr{align-self:flex-end;animation:slideUp 0.28s var(--ez) both;}
.msg.usr .mt-text{background:#1c1c1c;border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 4px 18px;padding:10px 16px;display:inline-block;}
.msg.bot{align-self:flex-start;animation:slideUp 0.28s var(--ez) both;}
.blbl{display:block;font-size:0.56rem;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:8px;text-transform:uppercase;}

.cpbtn{position:absolute;right:0;bottom:-20px;background:transparent;border:none;padding:4px;cursor:pointer;opacity:0.3;transition:opacity 0.2s var(--ez),filter 0.2s var(--ez);}
.cpbtn:hover{opacity:1;filter:drop-shadow(0 0 5px rgba(255,255,255,0.4));}
.cpbtn svg{fill:#777;width:13px;height:13px;display:block;transition:fill 0.2s;}
.cpbtn:hover svg{fill:#fff;}

.spin{width:20px;height:20px;border:2px solid rgba(255,255,255,0.08);border-top-color:rgba(255,255,255,0.5);border-radius:50%;margin:4px 0 2px 2px;animation:spin 0.75s linear infinite;will-change:transform;}

.dots{display:inline-flex;align-items:center;gap:4px;height:1em;vertical-align:middle;margin-left:2px;}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);display:inline-block;animation:dotB 1.1s ease-in-out infinite;will-change:opacity,transform;}
.dots span:nth-child(2){animation-delay:0.18s;}
.dots span:nth-child(3){animation-delay:0.36s;}

/* ── input bar ── */
#bar{
  position:fixed;z-index:200;
  /* Desktop: centered in right panel */
  left:calc(var(--sw) + (100vw - var(--sw))/2);
  transform:translateX(-50%);
  width:min(700px,calc(100vw - var(--sw) - 56px));
  bottom:max(18px,calc(var(--sb)+14px));
  display:flex;align-items:flex-end;gap:6px;padding:8px 10px;
  background:rgba(14,14,14,0.94);
  border:1px solid var(--bord);border-radius:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  transition:border-color 0.2s var(--ez),bottom 0.38s var(--ez);
  will-change:border-color,bottom;
}
#bar:focus-within{border-color:rgba(255,255,255,0.18);}
body.col #bar{
  left:calc(var(--stw) + (100vw - var(--stw))/2);
  width:min(700px,calc(100vw - var(--stw) - 56px));
}
/* empty: float up to center */
body.mt #bar{bottom:calc(50% - 30px);}

#inp{
  flex:1;min-width:0;background:transparent;border:none;color:#fff;
  font-family:var(--font);font-size:1rem;line-height:1.5;
  padding:7px 8px;resize:none;max-height:160px;overflow-y:auto;
  -webkit-user-select:text;user-select:text;
}
#inp::placeholder{color:#3a3a3a;}
#inp::-webkit-scrollbar{width:3px;}
#inp::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

.ibtn{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:50%;border:none;
  cursor:pointer;background:transparent;
  transition:transform 0.18s var(--ezs),opacity 0.15s var(--ez);
  -webkit-appearance:none;appearance:none;
}
.ibtn:active{transform:scale(0.86) !important;}

#micbtn{color:#555;}
#micbtn svg{fill:currentColor;width:19px;height:19px;transition:fill 0.2s var(--ez);}
#micbtn:hover svg{fill:#bbb;}
#micbtn.lst{background:rgba(255,50,50,0.12);color:#ff4444;}
#micbtn.lst svg{animation:pulse 1s ease-in-out infinite;}

#sndbtn{background:#fff;animation:glow 3s ease-in-out infinite;}
#sndbtn:hover{transform:scale(1.08);}
#sndbtn svg{fill:#000;width:18px;height:18px;transform:translateX(1px);}
#sndbtn:disabled{animation:none;opacity:0.35;pointer-events:none;transform:none !important;}

/* scroll btn */
#scrbtn{
  position:fixed;z-index:100;left:50%;
  bottom:max(90px,calc(var(--sb)+82px));
  transform:translateX(-50%) translateY(12px);
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);background:rgba(24,24,24,0.92);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  color:#888;cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s var(--ez),transform 0.25s var(--ez);
}
#scrbtn.on{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);}
#scrbtn:hover{color:#fff;background:rgba(40,40,40,0.95);}
#scrbtn svg{fill:currentColor;width:18px;height:18px;}

/* voice toast */
#vtoast{
  position:fixed;z-index:100;left:50%;
  bottom:max(82px,calc(var(--sb)+74px));
  transform:translateX(-50%) translateY(8px);
  padding:5px 14px;border-radius:20px;
  background:rgba(255,40,40,0.1);border:1px solid rgba(255,80,80,0.2);
  color:#ff6666;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  opacity:0;pointer-events:none;
  transition:opacity 0.22s var(--ez),transform 0.22s var(--ez);
}
#vtoast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ KEYFRAMES ═══════════════════════════════════════════ */
@keyframes shimmer{to{background-position:-200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotB{0%,60%,100%{opacity:0.2;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.88)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 22px rgba(255,255,255,0.4)}}

/* ══ MOBILE ≤700px ═══════════════════════════════════════ */
@media(max-width:700px){
  body{padding-top:0;}

  /* Sidebar: fixed drawer — ALWAYS sb-full, NEVER strip */
  #sb{
    position:fixed !important;top:0 !important;left:0 !important;
    height:100% !important;
    width:min(82vw,300px) !important;
    z-index:600 !important;
    transform:translateX(-110%) !important;
    transition:transform 0.3s var(--ez) !important;
    box-shadow:8px 0 40px rgba(0,0,0,0.85);
    will-change:transform;
    /* width must not collapse */
    min-width:0 !important;
  }
  #sb.open{transform:translateX(0) !important;}
  /* CRITICAL: sb-full always visible on mobile */
  #sb .sbf{display:flex !important;}
  #sb .sbs{display:none  !important;}
  /* Collapsed class does nothing on mobile */
  #sb.col .sbf{display:flex !important;}
  #sb.col .sbs{display:none  !important;}

  /* New chat button: always accessible */
  .sbh{padding-top:max(18px,calc(var(--st)+12px));}
  .ncbtn{min-height:48px;font-size:0.77rem;}

  #main{width:100% !important;}

  #hdr{padding:max(12px,calc(var(--st)+8px)) 12px 10px;}
  .htitle{font-size:1.05rem;}
  .hsub{display:none;}

  /* chat padding: clear header + input bar + safe areas */
  #chat{
    padding-left:12px !important;padding-right:12px !important;
    padding-top:max(92px,calc(var(--st)+78px)) !important;
    padding-bottom:max(110px,calc(var(--sb)+96px)) !important;
  }
  #chat.mt{padding-top:0 !important;padding-bottom:0 !important;overflow:hidden;}

  .msg{max-width:90%;font-size:0.95rem;}

  /* input bar: full width, safe-area insets, no sidebar offset */
  #bar{
    left:max(10px,var(--sl)) !important;
    right:max(10px,var(--sr)) !important;
    width:auto !important;max-width:none !important;
    transform:none !important;
    bottom:max(10px,calc(var(--sb)+8px)) !important;
    border-radius:20px;padding:6px 8px;
  }
  body.mt #bar{bottom:calc(50% - 28px) !important;}

  /* iOS: 16px prevents auto-zoom on focus */
  #inp{font-size:16px;}

  /* Larger tap targets */
  .ibtn{width:46px;height:46px;}
  #menubtn{min-width:46px;min-height:46px;}
  .ncbtn{padding:13px 14px;}
  .si{min-height:50px;padding:12px 10px;}
  .si-t{font-size:0.83rem;}
  .si-d{padding:8px;}
  .cpbtn{opacity:0.42;}

  #scrbtn{bottom:max(88px,calc(var(--sb)+80px));}
  #vtoast{bottom:max(80px,calc(var(--sb)+72px));}
}
@media(max-width:370px){.htitle{font-size:0.9rem;letter-spacing:0.18em;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}
</style>
</head>

<!-- body.mt  = chat is empty (welcome shown, input centered)  -->
<!-- body.col = sidebar collapsed (desktop)                    -->
<body class="mt">
<div id="app">
  <div id="overlay"></div>

  <!-- ═══ SIDEBAR ═══════════════════════════════════════ -->
  <div id="sb">
    <div class="sbf">
      <div class="sbh">
        <span class="sbbrand">BLANK_</span>
        <button class="ncbtn" id="ncbtn">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
          New Chat
        </button>
      </div>
      <div class="sbl" id="sbl"></div>
      <div class="sbfoot">
        <span class="sbuser">{{ username }}</span>
        <a href="/logout" class="logout">Logout</a>
      </div>
    </div>
    <!-- desktop collapsed strip -->
