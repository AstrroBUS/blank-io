<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>BLANK_</title>
<style>
:root {
  --sidebar-w: 260px;
  --strip-w:   56px;
  --bg:        #000;
  --sidebar-bg:#0a0a0a;
  --border:    rgba(255,255,255,0.07);
  --font:      "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  --ease-out:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

html { height: -webkit-fill-available; }

body {
  background: var(--bg);
  color: #fff;
  font-family: var(--font);
  height: 100dvh;
  min-height: -webkit-fill-available;
  width: 100vw;
  display: flex;
  overflow: hidden;
  position: fixed;
  inset: 0;
}

/* ═══════════════════════════════
   SIDEBAR
═══════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  will-change: width;
  transition: width 0.32s var(--ease-out), min-width 0.32s var(--ease-out);
  z-index: 200;
}

#sidebar.collapsed {
  width: var(--strip-w);
  min-width: var(--strip-w);
}
#sidebar.collapsed .sidebar-full { display: none; }
#sidebar.collapsed .sidebar-strip { display: flex; }

.sidebar-full {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 16px 14px;
  padding-top: max(20px, calc(var(--safe-top) + 12px));
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

.sidebar-brand {
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 8s linear infinite;
}

.new-chat-btn {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #aaa;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.7rem;
  gap: 8px;
  letter-spacing: 0.1em;
  padding: 11px 12px;
  text-transform: uppercase;
  will-change: background, transform;
  transition: background 0.2s var(--ease-out),
              color 0.2s var(--ease-out),
              transform 0.15s var(--ease-spring);
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.new-chat-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.new-chat-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }
.new-chat-btn svg { fill: currentColor; flex-shrink: 0; height: 14px; width: 14px; }

.sessions-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.sessions-list::-webkit-scrollbar { width: 3px; }
.sessions-list::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

.session-item {
  align-items: center;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  gap: 8px;
  justify-content: space-between;
  padding: 10px 10px;
  will-change: background;
  transition: background 0.18s var(--ease-out);
  -webkit-user-select: none;
  user-select: none;
}
.session-item:hover  { background: rgba(255,255,255,0.05); }
.session-item.active { background: rgba(255,255,255,0.08); }
.session-item:active { background: rgba(255,255,255,0.11); }

.session-title {
  color: #888;
  flex: 1;
  font-size: 0.78rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.18s var(--ease-out);
}
.session-item.active .session-title { color: #fff; }

.session-del {
  background: transparent;
  border: none;
  color: #333;
  cursor: pointer;
  flex-shrink: 0;
  padding: 5px;
  transition: color 0.2s var(--ease-out);
  border-radius: 6px;
}
.session-del:hover { color: #ff4444; }
.session-del:active { transform: scale(0.9); }
.session-del svg { fill: currentColor; height: 14px; width: 14px; display: block; }

.sidebar-footer {
  align-items: center;
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  justify-content: space-between;
  padding: 12px 16px;
  padding-bottom: max(12px, calc(var(--safe-bottom) + 8px));
}
.sidebar-user {
  color: #444;
  font-size: 0.7rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.logout-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: #444;
  cursor: pointer;
  flex-shrink: 0;
  font-family: var(--font);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  padding: 5px 9px;
  text-transform: uppercase;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  transition: color 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
}
.logout-btn:hover { border-color: rgba(255,255,255,0.18); color: #aaa; }

/* Collapsed strip */
.sidebar-strip {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 14px;
  height: 100%;
}
.strip-new-btn {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #666;
  cursor: pointer;
  display: flex;
  height: 36px;
  justify-content: center;
  will-change: background, color;
  transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out);
  width: 36px;
  flex-shrink: 0;
}
.strip-new-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.strip-new-btn svg { fill: currentColor; height: 16px; width: 16px; }
.strip-brand {
  animation: shimmer 8s linear infinite;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1;
  font-size: 0.52rem;
  font-weight: 800;
  letter-spacing: 0.25em;
  text-align: center;
  text-transform: uppercase;
  transform: rotate(180deg);
  writing-mode: vertical-rl;
}

/* Mobile overlay */
#sidebarOverlay {
  background: rgba(0,0,0,0.6);
  display: none;
  inset: 0;
  position: fixed;
  z-index: 199;
  opacity: 0;
  will-change: opacity;
  transition: opacity 0.28s var(--ease-out);
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
}
#sidebarOverlay.visible {
  display: block;
  opacity: 1;
}

/* ═══════════════════════════════
   MAIN
═══════════════════════════════ */
.main {
  display: flex;
  flex: 1;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

header {
  align-items: center;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  background: linear-gradient(to bottom, rgba(0,0,0,0.97) 60%, transparent 100%);
  display: flex;
  gap: 12px;
  left: 0; right: 0; top: 0;
  overflow: visible;
  padding: 18px 20px 14px;
  padding-top: max(18px, calc(var(--safe-top) + 12px));
  position: absolute;
  text-align: center;
  z-index: 400;
  will-change: backdrop-filter;
}

#menuBtn {
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  flex-shrink: 0;
  padding: 6px;
  border-radius: 8px;
  will-change: color;
  transition: color 0.2s var(--ease-out);
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#menuBtn:hover { color: #fff; }
#menuBtn:active { transform: scale(0.92); }
#menuBtn svg { display: block; fill: currentColor; height: 20px; width: 20px; }

.header-center {
  align-items: center;
  display: flex;
  flex: 1;
  flex-direction: column;
}

header h1 {
  animation: shimmer 8s linear infinite;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.header-sub {
  color: #555;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  margin-top: 2px;
  text-transform: uppercase;
}

/* Model dropdown */
.model-pill {
  display: inline-block;
  margin-top: 7px;
  position: relative;
}

.model-trigger {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  color: #777;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.6rem;
  gap: 5px;
  letter-spacing: 0.12em;
  padding: 5px 10px;
  text-transform: uppercase;
  will-change: border-color, color;
  transition: border-color 0.2s var(--ease-out), color 0.2s var(--ease-out);
  -webkit-user-select: none;
  user-select: none;
  white-space: nowrap;
}
.model-trigger:hover { border-color: rgba(255,255,255,0.2); color: #bbb; }
.model-trigger svg {
  fill: currentColor;
  height: 10px;
  will-change: transform;
  transition: transform 0.22s var(--ease-out);
  width: 10px;
}
.model-trigger.open svg { transform: rotate(180deg); }

.model-dropdown {
  background: #141414;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.95);
  opacity: 0;
  pointer-events: none;
  flex-direction: column;
  gap: 2px;
  min-width: 170px;
  padding: 6px;
  position: fixed;
  z-index: 9999;
  display: flex;
  will-change: opacity, transform;
  transform: translateX(-50%) translateY(-6px);
  transition: opacity 0.22s var(--ease-out), transform 0.22s var(--ease-out);
}
.model-dropdown.open {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}

.model-option {
  align-items: center;
  border-radius: 9px;
  color: #777;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.72rem;
  justify-content: space-between;
  letter-spacing: 0.06em;
  padding: 10px 12px;
  text-transform: uppercase;
  transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out);
}
.model-option:hover  { background: rgba(255,255,255,0.07); color: #fff; }
.model-option.selected { color: #fff; }
.model-check {
  background: #00ff87;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0,255,135,0.8);
  flex-shrink: 0;
  height: 7px;
  opacity: 0;
  width: 7px;
  transition: opacity 0.18s var(--ease-out);
}
.model-option.selected .model-check { opacity: 1; }

.header-right { flex-shrink: 0; width: 36px; }

@keyframes shimmer { to { background-position: -200% center; } }

/* ═══════════════════════════════
   CHAT
═══════════════════════════════ */
#chat {
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 28px;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 130px max(20px, calc((100% - 720px) / 2)) 160px;
  touch-action: pan-y;
  scroll-behavior: smooth;
}
#chat.empty {
  align-items: center;
  justify-content: center;
  padding-top: 0;
  padding-bottom: 100px;
  overflow: hidden;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 4px; }

/* Welcome */
.welcome-msg {
  animation: fadeUp 0.45s var(--ease-out) both;
  text-align: center;
  pointer-events: none;
  -webkit-user-select: none;
  user-select: none;
}
.welcome-title {
  color: #fff;
  display: block;
  font-size: 2rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Messages */
.msg {
  font-size: 1rem;
  line-height: 1.85;
  max-width: 80%;
  padding-bottom: 4px;
  position: relative;
  width: fit-content;
}
.msg-content {
  display: block;
  letter-spacing: 0.01em;
  white-space: pre-wrap;
  word-break: break-word;
}

.user {
  align-self: flex-end;
  animation: slideUp 0.28s var(--ease-out) both;
  will-change: opacity, transform;
}
.user .msg-content {
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px 18px 4px 18px;
  color: #fff;
  display: inline-block;
  padding: 10px 16px;
}

.bot {
  align-self: flex-start;
  color: #fff;
  animation: slideUp 0.28s var(--ease-out) both;
  will-change: opacity, transform;
}
.bot-label {
  color: #fff;
  display: block;
  font-size: 0.58rem;
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 10px;
  opacity: 0.25;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Copy btn */
.copy-btn {
  background: transparent;
  border: none;
  bottom: -20px;
  cursor: pointer;
  opacity: 0.3;
  padding: 4px;
  position: absolute;
  right: 0;
  will-change: opacity, filter;
  transition: opacity 0.2s var(--ease-out), filter 0.2s var(--ease-out);
}
.copy-btn svg { fill: #777; height: 13px; width: 13px; display: block; transition: fill 0.2s; }
.copy-btn:hover { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); opacity: 1; }
.copy-btn:hover svg { fill: #fff; }

/* Spinner */
.spinner {
  animation: spin 0.75s linear infinite;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  border-top-color: rgba(255,255,255,0.5);
  height: 20px;
  margin: 4px 0 2px 2px;
  width: 20px;
  will-change: transform;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Dot typing */
.dot-typing {
  align-items: center;
  display: inline-flex;
  gap: 4px;
  height: 1em;
  margin-left: 3px;
  vertical-align: middle;
}
.dot-typing span {
  animation: dotBounce 1.1s ease-in-out infinite;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  display: inline-block;
  height: 4px;
  width: 4px;
  will-change: opacity, transform;
}
.dot-typing span:nth-child(1) { animation-delay: 0s; }
.dot-typing span:nth-child(2) { animation-delay: 0.18s; }
.dot-typing span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotBounce {
  0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-4px); }
}

/* ═══════════════════════════════
   INPUT AREA
═══════════════════════════════ */
.input-area {
  align-items: flex-end;
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  background: rgba(18,18,18,0.9);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: flex;
  gap: 6px;
  max-width: 680px;
  padding: 8px 10px;
  position: fixed;
  z-index: 100;
  will-change: border-color, bottom;
  transition: border-color 0.2s var(--ease-out),
              bottom 0.4s var(--ease-out);
  bottom: max(20px, calc(var(--safe-bottom) + 16px));
  left: calc(var(--sidebar-w) + (100% - var(--sidebar-w)) / 2);
  transform: translateX(-50%);
  width: calc(100% - var(--sidebar-w) - 56px);
}
.input-area:focus-within { border-color: rgba(255,255,255,0.18); }

body.chat-empty .input-area {
  bottom: calc(50% - 28px);
}
body.sidebar-collapsed .input-area {
  left: calc(var(--strip-w) + (100% - var(--strip-w)) / 2);
  width: calc(100% - var(--strip-w) - 56px);
}

#input {
  background: transparent;
  border: none;
  color: #fff;
  display: block;
  flex: 1;
  font-family: var(--font);
  font-size: 1rem;
  line-height: 1.5;
  max-height: 160px;
  min-height: 24px;
  min-width: 0;
  overflow-y: auto;
  padding: 8px 8px;
  resize: none;
  -webkit-user-select: text;
  user-select: text;
}
#input::placeholder { color: #444; }
#input::-webkit-scrollbar { width: 3px; }
#input::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.mic-btn {
  align-items: center;
  background: transparent;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  flex-shrink: 0;
  height: 40px;
  justify-content: center;
  will-change: background, transform;
  transition: background 0.2s var(--ease-out), transform 0.15s var(--ease-spring);
  width: 40px;
  -webkit-appearance: none;
}
.mic-btn svg { fill: #555; height: 18px; transition: fill 0.2s var(--ease-out); width: 18px; }
.mic-btn:hover svg { fill: #bbb; }
.mic-btn:active { transform: scale(0.9); }
.mic-btn.listening { background: rgba(255,50,50,0.12); }
.mic-btn.listening svg {
  fill: #ff4444;
  animation: pulse 1s ease-in-out infinite;
  will-change: opacity, transform;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.88); }
}

.send-btn {
  align-items: center;
  animation: btnGlow 3s ease-in-out infinite;
  background: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  flex-shrink: 0;
  height: 40px;
  justify-content: center;
  will-change: transform, opacity, box-shadow;
  transition: transform 0.2s var(--ease-spring), opacity 0.2s var(--ease-out);
  width: 40px;
  -webkit-appearance: none;
}
.send-btn:hover  { transform: scale(1.07); }
.send-btn:active { transform: scale(0.93); }
.send-btn svg { fill: #000; height: 18px; transform: translateX(1px); width: 18px; }
.send-btn:disabled { animation: none; opacity: 0.35; pointer-events: none; }
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 0px rgba(255,255,255,0); }
  50%       { box-shadow: 0 0 22px rgba(255,255,255,0.4); }
}

/* ═══════════════════════════════
   SCROLL BTN + VOICE TOAST
═══════════════════════════════ */
#scrollBtn {
  align-items: center;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  background: rgba(28,28,28,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  bottom: max(92px, calc(var(--safe-bottom) + 84px));
  color: #999;
  cursor: pointer;
  display: flex;
  height: 36px;
  justify-content: center;
  left: 50%;
  opacity: 0;
  pointer-events: none;
  position: fixed;
  will-change: opacity, transform;
  transform: translateX(-50%) translateY(10px);
  transition: opacity 0.25s var(--ease-out), transform 0.25s var(--ease-out);
  width: 36px;
  z-index: 99;
}
#scrollBtn.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
#scrollBtn:hover { background: rgba(50,50,50,0.95); color: #fff; }
#scrollBtn svg { fill: currentColor; height: 18px; width: 18px; }

#voiceToast {
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  background: rgba(255,50,50,0.1);
  border: 1px solid rgba(255,80,80,0.2);
  border-radius: 20px;
  bottom: max(82px, calc(var(--safe-bottom) + 74px));
  color: #ff6666;
  font-size: 0.6rem;
  left: 50%;
  letter-spacing: 0.15em;
  opacity: 0;
  padding: 5px 14px;
  pointer-events: none;
  position: fixed;
  text-transform: uppercase;
  will-change: opacity, transform;
  transform: translateX(-50%) translateY(8px);
  transition: opacity 0.22s var(--ease-out), transform 0.22s var(--ease-out);
  z-index: 98;
}
#voiceToast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════
   MOBILE
═══════════════════════════════ */
@media (max-width: 700px) {

  /* Sidebar — slide-over overlay */
  #sidebar {
    height: 100%;
    left: 0; top: 0;
    position: fixed;
    will-change: transform;
    transform: translateX(-100%);
    transition: transform 0.3s var(--ease-out);
    width: 82vw !important;
    max-width: 300px !important;
    min-width: 0 !important;
    box-shadow: 6px 0 32px rgba(0,0,0,0.7);
    /* FIX: always show sidebar-full on mobile, never the strip */
    display: flex !important;
    flex-direction: column !important;
  }
  #sidebar.open { transform: translateX(0); }

  /* Always show full sidebar content on mobile — never strip */
  #sidebar .sidebar-full  { display: flex !important; }
  #sidebar .sidebar-strip { display: none !important; }
  /* Override collapsed state on mobile */
  #sidebar.collapsed { width: 82vw !important; }

  .main { width: 100%; }

  header {
    padding: 12px 14px 10px;
    padding-top: max(12px, calc(var(--safe-top) + 10px));
  }
  header h1 { font-size: 1.05rem; }
  .header-sub { display: none; }

  #chat {
    padding: 88px 12px 130px;
    padding-top: max(88px, calc(var(--safe-top) + 76px));
    padding-bottom: max(130px, calc(var(--safe-bottom) + 110px));
    gap: 22px;
  }
  #chat.empty { padding: 0; }

  .msg { font-size: 0.95rem; max-width: 90%; }
  .msg-content { font-size: 0.95rem; }

  /* Input — safe area aware, full width */
  .input-area {
    bottom: max(12px, calc(var(--safe-bottom) + 10px)) !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: calc(100% - 24px) !important;
    max-width: 100% !important;
    border-radius: 20px;
    padding: 6px 8px;
    transition: bottom 0.4s var(--ease-out), border-color 0.2s var(--ease-out);
  }
  body.chat-empty .input-area {
    bottom: calc(50% - 28px) !important;
  }

  /* iOS font-size trick — prevents zoom on focus */
  #input { font-size: 16px; }

  /* Bigger tap targets */
  .mic-btn, .send-btn { width: 44px; height: 44px; }
  .new-chat-btn { padding: 12px 14px; font-size: 0.75rem; }
  .session-item { padding: 12px 10px; min-height: 48px; }
  .session-title { font-size: 0.82rem; }
  .session-del { padding: 8px; }
  .session-del svg { width: 16px; height: 16px; }

  #scrollBtn { bottom: max(90px, calc(var(--safe-bottom) + 82px)); }
  #voiceToast { bottom: max(82px, calc(var(--safe-bottom) + 74px)); }

  /* Copy always slightly visible on touch */
  .copy-btn { opacity: 0.4; }

  /* Bigger menu button hit area */
  #menuBtn { min-width: 44px; min-height: 44px; }
}

@media (max-width: 380px) {
  header h1 { font-size: 0.92rem; letter-spacing: 0.18em; }
  .input-area { width: calc(100% - 16px) !important; }
  .msg { max-width: 95%; }
}

/* Reduce motion for accessibility */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body class="chat-empty">

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">

        New Chat
      </button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>

    </button>
    <span class="strip-brand">BLANK_</span>

</div>

<!-- MAIN -->
<div class="main">
  <header>
    <button id="menuBtn" onclick="toggleSidebar()" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>

    <div class="header-center">
      <h1>BLANK_</h1>
      <span class="header-sub">System Online</span>
      <div class="model-pill" id="modelPill">
        <div class="model-trigger" id="modelTrigger" onclick="toggleModelDropdown()">
          <span id="modelLabel">Flash ⚡</span>
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        <div class="model-dropdown" id="modelDropdown">
          <div class="model-option selected" data-value="llama-3.1-8b-instant" onclick="selectModel(this)">
            Flash ⚡ <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="mixtral-8x7b-32768" onclick="selectModel(this)">
            Balanced <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="gemma2-9b-it" onclick="selectModel(this)">
            Precise <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="llama-3.3-70b-versatile" onclick="selectModel(this)">
            Reasoning <span class="model-check"></span>

    <div class="header-right"></div>
  </header>

  <button id="scrollBtn" onclick="forceScrollBottom()" aria-label="Scroll to bottom">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>

    </div>

  <div class="input-area" id="inputArea">

      id="input"
      placeholder="Ask BLANK_"
      autocomplete="off"

      aria-label="Message input"
    ></textarea>
    <button id="micBtn" class="mic-btn" onclick="toggleVoice()" title="Voice input" aria-label="Voice input">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.01 2.83 5.4 5.91 5.88V20H9c-.55 0-1 .45-1 1s.45 1 1 1h6c.55 0 1-.45 1-1s-.45-1-1-1h-2v-2.02c3.08-.47 5.42-2.87 5.91-5.88.1-.6-.39-1.1-1-1.1z"/></svg>

      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>

<script>
/* ── Refs ── */
const chatEl       = document.getElementById("chat");
const input        = document.getElementById("input");
const btn          = document.getElementById("sendBtn");
const micBtn       = document.getElementById("micBtn");
const scrollBtn    = document.getElementById("scrollBtn");
const voiceToast   = document.getElementById("voiceToast");
const sidebar      = document.getElementById("sidebar");
const overlay      = document.getElementById("sidebarOverlay");
const sessionsList = document.getElementById("sessionsList");

/* ── State ── */
let history        = [];
let currentSessId  = null;
let userScrolledUp = false;
let isTyping       = false;
let selectedModel  = "llama-3.1-8b-instant";
let scrollRAF      = null;

/* ── Utils ── */
function escHtml(s) {
  return s
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function copyIconSVG() {
  return `<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>`;
}
function getCopyBtnHTML() {
  return `<button class="copy-btn" onclick="copyText(this)" title="Copy" aria-label="Copy message">${copyIconSVG()}</button>`;
}

function isMobile() { return window.innerWidth <= 700; }

/* ── Debounce ── */
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

/* ═══════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════ */
function checkEmpty() {
  const isEmpty = chatEl.querySelectorAll(".msg").length === 0;
  chatEl.classList.toggle("empty", isEmpty);
  document.body.classList.toggle("chat-empty", isEmpty);

  let wm = document.getElementById("welcomeMsg");
  if (isEmpty && !wm) {
    const w = document.createElement("div");
    w.className = "welcome-msg";
    w.id = "welcomeMsg";
    w.innerHTML = `<span class="welcome-title">Ready.</span>`;
    chatEl.prepend(w);
  } else if (!isEmpty && wm) {
    wm.remove();
  }
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
function toggleSidebar() {
  if (isMobile()) {
    sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
  } else {
    const col = sidebar.classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed", col);
  }
}

function openSidebar() {
  sidebar.classList.add("open");
  overlay.style.display = "block";
  // rAF to trigger transition
  requestAnimationFrame(() => overlay.classList.add("visible"));
}

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("visible");
  // Hide after transition
  setTimeout(() => {
    if (!overlay.classList.contains("visible")) overlay.style.display = "none";
  }, 300);
}

/* Close sidebar on swipe left (mobile) */
(function() {
  let startX = 0, startY = 0;
  document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx < -50 && dy < 60 && sidebar.classList.contains("open")) closeSidebar();
  }, { passive: true });
})();

/* ═══════════════════════════════════════
   SESSIONS
═══════════════════════════════════════ */
async function loadSessions() {
  try {
    const res  = await fetch("/sessions", { credentials: "include" });
    const data = await res.json();
    renderSessions(data.sessions || []);
  } catch(e) { console.error("loadSessions:", e); }
}

function renderSessions(sessions) {
  sessionsList.innerHTML = "";
  if (!sessions.length) {
    sessionsList.innerHTML = `<div style="color:#2a2a2a;font-size:0.7rem;padding:14px 10px;letter-spacing:0.08em;">No chats yet</div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  sessions.forEach(s => {
    const div = document.createElement("div");
    div.className = "session-item" + (s.id === currentSessId ? " active" : "");
    div.dataset.id = s.id;

    const titleSpan = document.createElement("span");
    titleSpan.className = "session-title";
    titleSpan.textContent = s.title;

    const delBtn = document.createElement("button");
    delBtn.className = "session-del";
    delBtn.title = "Delete";
    delBtn.setAttribute("aria-label", "Delete chat");
    delBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;
    delBtn.addEventListener("click", e => { e.stopPropagation(); deleteSession(e, s.id); });

    div.appendChild(titleSpan);
    div.appendChild(delBtn);
    div.addEventListener("click", () => loadSession(s.id));
    frag.appendChild(div);
  });
  sessionsList.appendChild(frag);
}

async function startNewChat() {
  if (currentSessId && chatEl.querySelectorAll(".msg").length === 0) {
    closeSidebar();
    input.focus();
    return;
  }
  try {
    const res  = await fetch("/sessions/new", { method: "POST", credentials: "include" });
    const data = await res.json();
    currentSessId = data.id;
    history = [];
    clearChatUI();
    await loadSessions();
    closeSidebar();
    setTimeout(() => input.focus(), 350);
  } catch(e) { console.error("startNewChat:", e); }
}

async function loadSession(id) {
  try {
    const res  = await fetch(`/sessions/${id}`, { credentials: "include" });
    const data = await res.json();
    if (data.error) return;

    currentSessId = data.id;
    history = data.messages.map(m => ({ role: m.role, content: m.content }));
    clearChatUI();
    data.messages.forEach(m => {
      if (m.role === "user") addUserMsgInstant(m.content);
      else addBotMsgInstant(m.content);
    });
    checkEmpty();
    forceScrollBottom();
    await loadSessions();
    closeSidebar();
  } catch(e) { console.error("loadSession:", e); }
}

async function deleteSession(e, id) {
  e.stopPropagation();
  try {
    await fetch(`/sessions/${id}`, { method: "DELETE", credentials: "include" });
    if (currentSessId === id) {
      currentSessId = null;
      history = [];
      clearChatUI();
    }
    await loadSessions();
  } catch(e) { console.error("deleteSession:", e); }
}

/* ═══════════════════════════════════════
   SCROLL
═══════════════════════════════════════ */
const onChatScroll = debounce(() => {
  const dist = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight;
  userScrolledUp = dist > 80;
  scrollBtn.classList.toggle("visible", userScrolledUp);
}, 60);

chatEl.addEventListener("scroll", onChatScroll, { passive: true });
chatEl.addEventListener("touchstart", () => { userScrolledUp = true; }, { passive: true });

function forceScrollBottom() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  scrollRAF = requestAnimationFrame(() => {
    chatEl.scrollTop = chatEl.scrollHeight;
    userScrolledUp = false;
    scrollBtn.classList.remove("visible");
  });
}

function autoScroll() {
  if (!userScrolledUp) {
    if (scrollRAF) cancelAnimationFrame(scrollRAF);
    scrollRAF = requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
  }
}

/* ═══════════════════════════════════════
   TEXTAREA
═══════════════════════════════════════ */
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
}
input.addEventListener("input", autoResize, { passive: true });
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ═══════════════════════════════════════
   SEND
═══════════════════════════════════════ */
async function send() {
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  if (!currentSessId) {
    try {
      const r = await fetch("/sessions/new", { method: "POST", credentials: "include" });
      const d = await r.json();
      currentSessId = d.id;
      await loadSessions();
    } catch(e) { /* continue */ }
  }

  stopVoice();
  addUserMsg(text);
  input.value = "";
  autoResize();
  btn.disabled = true;
  forceScrollBottom();

  const loadId = showLoading();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history, model: selectedModel, session_id: currentSessId })
    });

    removeLoading(loadId);
    if (!res.ok) throw new Error("Server error");

    const data  = await res.json();
    const reply = (data.reply || "No response received.").trim();

    history.push({ role: "user",      content: text  });
    history.push({ role: "assistant", content: reply });

    typeMsg(reply);
    if (history.length === 2) loadSessions();

  } catch(err) {
    removeLoading(loadId);
    typeMsg("Connection lost. Check system status.");
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

/* ═══════════════════════════════════════
   CHAT UI HELPERS
═══════════════════════════════════════ */
function clearChatUI() {
  chatEl.innerHTML = "";
  isTyping = false;
  userScrolledUp = false;
  scrollBtn.classList.remove("visible");
  checkEmpty();
}

function addUserMsg(text) {
  const div  = document.createElement("div");
  div.className = "msg user";
  const span = document.createElement("span");
  span.className = "msg-content";
  const dots = makeDots();
  div.appendChild(span);
  div.appendChild(dots);
  chatEl.appendChild(div);
  checkEmpty();
  autoScroll();

  let i = 0;
  const CHUNK = 2; // type 2 chars per tick for snappier feel
  function type() {
    if (i < text.length) {
      span.textContent += text.slice(i, i + CHUNK);
      i += CHUNK;
      autoScroll();
      requestAnimationFrame(type);
    } else {
      dots.remove();
      div.insertAdjacentHTML("beforeend", getCopyBtnHTML());
    }
  }
  requestAnimationFrame(type);
}

function addUserMsgInstant(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<span class="msg-content">${escHtml(text)}</span>${getCopyBtnHTML()}`;
  chatEl.appendChild(div);
}

function addBotMsgInstant(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<span class="bot-label">BLANK_</span><span class="msg-content">${escHtml(text)}</span>${getCopyBtnHTML()}`;
  chatEl.appendChild(div);
}

function showLoading() {
  const id  = "load-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = id;
  div.innerHTML = `<span class="bot-label">BLANK_</span><div class="spinner"></div>`;
  chatEl.appendChild(div);
  autoScroll();
  return id;
}
function removeLoading(id) { const el = document.getElementById(id); if (el) el.remove(); }

function typeMsg(text) {
  isTyping = true;
  userScrolledUp = false;

  const div    = document.createElement("div");
  div.className = "msg bot";
  const label  = document.createElement("span");
  label.className = "bot-label";
  label.textContent = "BLANK_";
  const spinner = document.createElement("div");
  spinner.className = "spinner";
  const span   = document.createElement("span");
  span.className = "msg-content";
  const dots   = makeDots();

  div.appendChild(label);
  div.appendChild(spinner);
  div.appendChild(span);
  div.appendChild(dots);
  chatEl.appendChild(div);
  autoScroll();

  let i = 0;
  let lastScroll = 0;
  function type() {
    if (i < text.length) {
      if (i === 0 && spinner.parentNode) spinner.remove();
      // Batch chars for smooth perf
      const batch = Math.min(3, text.length - i);
      span.textContent += text.slice(i, i + batch);
      i += batch;
      const now = Date.now();
      if (now - lastScroll > 60) { autoScroll(); lastScroll = now; }
      setTimeout(type, 14);
    } else {
      isTyping = false;
      dots.remove();
      div.insertAdjacentHTML("beforeend", getCopyBtnHTML());
      autoScroll();
    }
  }
  type();
}

function makeDots() {
  const w = document.createElement("span");
  w.className = "dot-typing";
  w.innerHTML = "<span></span><span></span><span></span>";
  return w;
}

function copyText(b) {
  const span = b.closest(".msg").querySelector(".msg-content");
  if (!span) return;
  navigator.clipboard.writeText(span.textContent).then(() => {
    b.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#00ff87"/></svg>`;
    setTimeout(() => { b.innerHTML = copyIconSVG(); }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement("textarea");
    ta.value = span.textContent;
    ta.style.cssText = "position:fixed;top:-999px;left:-999px;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  });
}

/* ═══════════════════════════════════════
   MODEL DROPDOWN
═══════════════════════════════════════ */
function toggleModelDropdown() {
  const trigger  = document.getElementById("modelTrigger");
  const dropdown = document.getElementById("modelDropdown");
  const isOpen   = dropdown.classList.contains("open");

  if (!isOpen) {
    const rect    = trigger.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    dropdown.style.top  = (rect.bottom + 8) + "px";
    dropdown.style.left = centerX + "px";
    // Edge-clamp after paint
    requestAnimationFrame(() => {
      const dr = dropdown.getBoundingClientRect();
      if (dr.right > window.innerWidth - 8) {
        dropdown.style.left = (window.innerWidth - dr.width - 8) + "px";
        dropdown.style.transform = "none";
      }
      if (dr.left < 8) {
        dropdown.style.left = "8px";
        dropdown.style.transform = "none";
      }
    });
  }

  dropdown.classList.toggle("open", !isOpen);
  trigger.classList.toggle("open", !isOpen);
}

function selectModel(el) {
  document.querySelectorAll(".model-option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  selectedModel = el.dataset.value;
  document.getElementById("modelLabel").textContent = el.childNodes[0].textContent.trim();
  document.getElementById("modelDropdown").classList.remove("open");
  document.getElementById("modelTrigger").classList.remove("open");
}

document.addEventListener("click", e => {
  const pill = document.getElementById("modelPill");
  if (pill && !pill.contains(e.target)) {
    document.getElementById("modelDropdown").classList.remove("open");
    document.getElementById("modelTrigger").classList.remove("open");
  }
}, { passive: true });

/* ═══════════════════════════════════════
   VOICE
═══════════════════════════════════════ */
let recognition = null;
let isListening  = false;

function toggleVoice() {
  if (isListening) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { typeMsg("Voice input not supported. Try Chrome or Edge."); return; }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart  = () => { isListening = true;  micBtn.classList.add("listening");    voiceToast.classList.add("visible"); };
  recognition.onend    = () => { isListening = false; micBtn.classList.remove("listening"); voiceToast.classList.remove("visible"); recognition = null; };
  recognition.onerror  = () => { isListening = false; micBtn.classList.remove("listening"); voiceToast.classList.remove("visible"); recognition = null; };
  recognition.onresult = e  => {
    let interim = "", final = "";
    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    input.value = final || interim;
    autoResize();
  };

  recognition.start();
}
function stopVoice() { if (recognition && isListening) { try { recognition.stop(); } catch(e){} } }

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
window.send                = send;
window.toggleSidebar       = toggleSidebar;
window.closeSidebar        = closeSidebar;
window.startNewChat        = startNewChat;
window.loadSession         = loadSession;
window.deleteSession       = deleteSession;
window.forceScrollBottom   = forceScrollBottom;
window.copyText            = copyText;
window.toggleVoice         = toggleVoice;
window.toggleModelDropdown = toggleModelDropdown;
window.selectModel         = selectModel;

// Init overlay as hidden
overlay.style.display = "none";

checkEmpty();
loadSessions();
</script>
